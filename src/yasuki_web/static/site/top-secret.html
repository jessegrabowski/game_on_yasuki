<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Play (WIP) &mdash; Game on, Yasuki!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site/site.css">
<link rel="stylesheet" href="/site/play.css">
</head>
<body>

<header class="ribbon">
  <a class="ribbon-mark" href="/"><span class="torii">&#x26E9;</span> Game on, Yasuki!</a>
  <nav class="ribbon-nav">
    <a href="/card-search">Card Search</a>
    <a href="/deck-builder/">Deck Builder</a>
    <span class="wip-tag">Play &mdash; work in progress</span>
  </nav>
</header>

<!-- Lobby: pick a name, create or join a room. -->
<section id="lobbyView" class="play-view">
  <div class="play-panel">
    <h1>Game Lobby</h1>
    <label class="field">
      <span>Your name</span>
      <input type="text" id="playerName" maxlength="50" autocomplete="off" spellcheck="false"
             placeholder="Samurai">
    </label>

    <div class="lobby-actions">
      <form id="createForm" class="create-form">
        <input type="text" id="roomName" maxlength="60" autocomplete="off"
               placeholder="Room name (optional)">
        <button type="submit">Create room</button>
      </form>
      <form id="joinForm" class="join-form">
        <input type="text" id="joinRoomId" maxlength="64" autocomplete="off"
               placeholder="Room id">
        <button type="submit">Join by id</button>
      </form>
    </div>

    <div class="rooms-header">
      <h2>Open rooms</h2>
      <button type="button" id="refreshRooms">Refresh</button>
    </div>
    <ul id="roomList" class="room-list"></ul>
    <p id="lobbyStatus" class="status-line"></p>
  </div>
</section>

<!-- Room: shown after joining. Board + chat arrive in later PRs. -->
<section id="roomView" class="play-view" hidden>
  <div class="play-panel">
    <div class="room-bar">
      <h1>Room <span id="roomIdLabel" class="room-id"></span></h1>
      <button type="button" id="leaveRoom">Leave</button>
    </div>
    <h2>Players</h2>
    <ul id="playerList" class="player-list"></ul>
    <p id="roomStatus" class="status-line"></p>
  </div>
</section>

<script type="module" src="/site/top-secret.js"></script>
</body>
</html>
