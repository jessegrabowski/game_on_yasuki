<main class="doc">
  <h1>Settings</h1>
  <p class="doc-lead">
    Your display name is what other players see. It's generated for you and never your Google name —
    change it to whatever you like.
  </p>

  <form id="displayNameForm" class="settings-form">
    <label class="field">
      <span>Display name</span>
      <input type="text" id="displayNameInput" maxlength="40" autocomplete="off" spellcheck="false">
    </label>
    <button type="submit">Save</button>
  </form>
  <p id="settingsStatus" class="status-line"></p>

  <p class="doc-lead"><a href="/privacy">How sign-in &amp; your data work</a></p>
</main>
