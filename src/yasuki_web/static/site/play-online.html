<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Play &mdash; Game on, Yasuki!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site/site.css">
<link rel="stylesheet" href="/site/play.css">
</head>
<body>

<header class="ribbon">
  <a class="ribbon-mark" href="/"><span class="torii">&#x26E9;</span> Game on, Yasuki!</a>
  <nav class="ribbon-nav">
    <a href="/card-search">Card Search</a>
    <a href="/syntax">Syntax</a>
    <a href="/deck_builder/">Deck Builder</a>
    <a href="/play" class="active">Play</a>
  </nav>
</header>

<!-- Lobby: pick a name, create or join a room. -->
<section id="lobbyView" class="play-view">
  <div class="play-panel">
    <h1>Game Lobby</h1>

    <div class="lobby-actions">
      <form id="createForm" class="create-form">
        <input type="text" id="roomName" maxlength="60" autocomplete="off"
               placeholder="Room name (optional)">
        <button type="submit">Create room</button>
      </form>
      <form id="joinForm" class="join-form">
        <input type="text" id="joinRoomId" maxlength="64" autocomplete="off"
               placeholder="Room id">
        <button type="submit">Join by id</button>
      </form>
    </div>

    <div class="rooms-header">
      <h2>Open rooms</h2>
      <button type="button" id="refreshRooms">Refresh</button>
    </div>
    <ul id="roomList" class="room-list"></ul>
    <p id="lobbyStatus" class="status-line"></p>
  </div>
</section>

<!-- Room: a full-screen game client shown after joining. Large board left; linked log/chat rail
     right, divided by a draggable boundary. -->
<section id="roomView" class="room" hidden>
  <header class="room-topbar">
    <div class="room-ident">
      <span class="torii" aria-hidden="true">&#x26E9;</span>
      <span class="room-kicker">Room</span>
      <span id="roomIdLabel" class="room-id"></span>
    </div>
    <ul id="playerList" class="seats"></ul>
    <div class="room-actions">
      <button type="button" id="loadDeckButton" class="btn btn-ghost">Load deck</button>
      <button type="button" id="myDecksButton" class="btn btn-ghost">My decks</button>
      <input type="file" id="deckFileInput" accept=".yaml,.yml,application/yaml" hidden>
      <button type="button" id="readyButton" class="btn">Ready</button>
      <button type="button" id="goldfishButton" class="btn btn-ghost">Goldfish solo</button>
      <button type="button" id="newGameButton" class="btn">New game</button>
      <button type="button" id="leaveRoom" class="btn btn-ghost">Leave table</button>
    </div>
  </header>

  <div class="room-body">
    <main id="boardStage" class="board-stage">
      <div class="seat-bar opponent">
        <div id="opponentPanel" class="player-panel"></div>
        <div id="opponentHand" class="hand-strip" data-zone="hand" aria-label="Opponent hand"></div>
      </div>

      <div class="table">
        <div id="battlefield" class="battlefield" data-zone="battlefield"></div>
        <div id="opponentTableau" class="tableau opponent" aria-label="Opponent decks and provinces"></div>
        <div id="selfTableau" class="tableau self" aria-label="Your decks and provinces"></div>
      </div>

      <div class="seat-bar self">
        <div id="selfPanel" class="player-panel"></div>
        <div id="selfHand" class="hand-strip" data-zone="hand" aria-label="Your hand"></div>
      </div>
    </main>

    <div id="railResizer" class="rail-resizer" role="separator" aria-orientation="vertical"
         tabindex="0" aria-label="Resize the side panel"></div>

    <aside id="rail" class="rail">
      <section class="pane">
        <h2 class="pane-title">Game log</h2>
        <ul id="actionLog" class="action-log">
          <li class="pane-empty">The table awaits the first move.</li>
        </ul>
      </section>
      <div id="railSplitter" class="rail-splitter" role="separator" aria-orientation="horizontal"
           tabindex="0" aria-label="Resize the log and chat panes"></div>
      <section class="pane pane-chat">
        <h2 class="pane-title">Chat</h2>
        <ul id="chatLog" class="chat-log"></ul>
        <form id="chatForm" class="chat-form">
          <input type="text" id="chatInput" maxlength="500" autocomplete="off"
                 placeholder="Send a message&hellip;">
        </form>
      </section>
    </aside>
  </div>
</section>

<script type="module" src="/site/play-online.js"></script>
<script type="module" src="/site/account-widget.js"></script>
</body>
</html>
