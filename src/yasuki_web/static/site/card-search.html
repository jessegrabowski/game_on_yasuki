<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Search &mdash; Game on, Yasuki!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site/site.css">
</head>
<body>

<header class="ribbon">
  <a class="ribbon-mark" href="/"><span class="torii">&#x26E9;</span> Game on, Yasuki!</a>
  <nav class="ribbon-nav">
    <a href="/card-search" class="active">Card Search</a>
    <a href="/syntax">Syntax</a>
    <a href="/deck-builder/">Deck Builder</a>
    <a href="/play-online">Play Online</a>
  </nav>
</header>

<div class="search-page-bar">
  <div class="search-controls">
    <form id="searchForm" class="search-form" action="/card-search" method="get" role="search">
      <input type="text" id="q" name="q" autocomplete="off" spellcheck="false"
             placeholder="Search the Empire&hellip;">
      <button type="submit" aria-label="Search">&#x2192;</button>
    </form>
    <label class="sort-label" for="sort">Sort</label>
    <select id="sort" name="sort" form="searchForm">
      <option value="name">Name</option>
      <option value="force">Force</option>
      <option value="chi">Chi</option>
      <option value="gold_cost">Gold Cost</option>
      <option value="focus">Focus</option>
      <option value="personal_honor">Personal Honor</option>
      <option value="province_strength">Province Strength</option>
      <option value="honor_requirement">Honor Requirement</option>
    </select>
    <select id="order" name="order" form="searchForm">
      <option value="asc">Ascending</option>
      <option value="desc">Descending</option>
    </select>
  </div>
  <p class="search-suggestion">
    Try <code class="suggestion" id="suggestion" role="button" tabindex="0">&hellip;</code>
    &nbsp;&middot;&nbsp; <a href="/syntax">query syntax</a>
  </p>
</div>

<div class="result-meta" id="resultMeta"></div>
<div class="results-grid" id="grid"></div>
<div class="sentinel" id="sentinel"></div>
<div class="status-line" id="status"></div>

<script type="module" src="/site/card-search.js"></script>
</body>
</html>
