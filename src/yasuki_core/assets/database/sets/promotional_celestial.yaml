set: Promotional–Celestial
cards:
  - title: All That Will Be Lost
    type: Event
    deck: Dynasty
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, you may
      choose and bow a Personality.
    legality:
    - Destroyer War (Celestial)
    - Legacy
    - Modern
    banned: Banned via internet on 12/24/12 from Emperor Edition tournaments
    card_notes: Legal December 1st, 2011,Released in the 2011 Summer Convention pack
    rarity: Promo
    artist: Diego Gisbert Llorens
    flavor: '"My predecessors and I have struggled against the Empire for more than one thousand years. Always seeking its destruction
      or its subjugation. Now that moment seems at hand and I find myself... remorseful. I want only respect for Fu Leng. If
      all of Rokugan is dead, who will exalt his name?" - Daigotsu'
    number: 1

  - title: Festival of Coronation
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, if you
      control the Imperial Favor, draw a card. Otherwise, take the Imperial Favor.
    legality:
    - Destroyer War (Celestial)
    - Legacy
    - Modern
    card_notes: Legal December 1st, 2010
    rarity: Promo
    artist: Marc Scheff
    flavor: '"As the second year of the Divine Empress Iweko I begins, the Empire is assaulted by forces beyond anything we
      have ever witnessed. Despite the pain, despite the suffering, the faith of our people in the Empress does not waver, for
      she is of the Heavens." - Miya Shoin, Imperial Herald'
    number: 2

  - title: Festival of Founding
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, have
      a happy fifteenth anniversary; draw a card.
    legality:
    - Destroyer War (Celestial)
    - Legacy
    - Modern
    card_notes: Legal November 1st, 2010
    rarity: Promo
    artist: Drew Baker
    flavor: Regardless of other circumstances, during the Festival of Founding, all citizens of the Emerald Empire give thanks
      and celebrate the foundation of Rokugan, remembering the Kami and their valor.
    number: 3

  - title: Minor Blackmail
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, choose
