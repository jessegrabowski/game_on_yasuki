    - Age of Conquest (Emperor)
    - Destroyer War (Celestial)
    - Legacy
    - Modern
    card_notes: Legal August 1st, 2011,Released in the 2011 Kotei pack
    rarity: Promo
    artist: Beth Trott
    flavor: '"Just take your filthy money and go." "There is no reason to be hostile. One could imagine how much every koku
      helps the Scorpion defend the southern borders."'
    number: 4

