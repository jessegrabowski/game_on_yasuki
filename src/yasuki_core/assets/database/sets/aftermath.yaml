    - Legacy
    - Modern
    - War of the Seals (Onyx Edition)
    rarity: Rare
    artist: Nikolay Stoyanov
    flavor: The Mantis viewed the whole of the Colonies as their domain, regardless of the feelings of the other clans. With
      certain hidden threats eliminated, the Mantis turned their attention toward threats long forgotten, and began seeking
      a northern route to distant Medinaat al-Salaam.
