    - Legacy
    - Modern
    rarity: Rare
    artist: Albert Tavira
    flavor: '"Unfortunate circumstances prevent me from presenting this to your mother, as would be my wish," Kanpeki said with
      a low bow. "In her stead, naturally, I sought out the most worthy scion of the Imperial families to serve as her representative."'
    number: 4

  - title: Into the Wastes
