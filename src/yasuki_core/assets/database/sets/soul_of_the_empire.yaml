  back_title: A Thousand Lion
  back_flavor: 'Creatures swarmed through the Shadowlands, engaging the Empire''s armies with blackened claws and
    poison fangs.

    The Lion held their ground, but it was not enough: the armies must continue marching to the Shadow''s city,
    or lose the Empire.

    Tsanuri frowned, looking at the maps. "It will take your small group only three days to reach the city. The
    armies can follow. If we lose more time, the Shadow will destroy the gate before we arrive and all will be for
    nothing."

    Kitsu Motso''s voice rumbled beneath the battle cries, "Someone must hold the Horde here."

    Steel shone in Tsanuri''s eyes. "While you go, we will attack from this flank"—she pointed to the map—"giving
    you time to make it to that pass."

    Motso nodded. "Are you certain I should lead that unit?"

    Tsanuri stared into his eyes. "They need someone they can trust. We both know the Lion do not trust me—any more
    than you do."

    "Oni no Akuma has a hundred thousand beasts at his command. If you stay, you will die."

    "Do not question my command, Motso-san." Her voice was calm despite the screams that echoed over the plain.

    For a moment, the two commanders stood, silent in the battle''s chaos. A flicker of respect passed between them.
    Then Motso bowed. Tsanuri nodded, replaced her helmet, and grasped her father''s sword. "The Ikoma troops will
    not falter. You will have three days—but no more." She turned back toward the Lion legions.

    Motso watched her go.

    "We are Lion," he said, saluting as she faded into the mist.

    "We will not fail."

    But Akuma already knew the Lion''s plans.'
