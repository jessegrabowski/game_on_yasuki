  types:
  - Stronghold
  decks:
  - Pre-Game
  clans:
  - Mantis
  text: Fox and Fox Clan Personalities enter play paying 2 less Gold for you.<br>Your Shugenja have +1C.<br>When
    choosing the battlefield at which to fight the next battle, if you are the Defender, you choose instead of the
    Attacker.
  province_strength: 5
  starting_honor: 6
  legality:
  - Hidden Emperor (Jade)
  - Legacy
  errata_text: There is no longer a restriction on bringing Mantis Clan personalities into play.
  rarity: Uncommon
  artist: Theresa Brandon
  back_title: Son of my Heart
  back_flavor: 'The Water Dragon moved among the Mantis isles, its sinuous body rising with each gust of wind that
    churned the waves. It coiled, then lifted its massive head. The sea began to part.


    Come, son of Osano-Wo, it called, and the roar of the waves echoed in its voice. It no more spoke with words
    than the sky could shout a battle-cry, yet its voice echoed within the Celestial Heavens and resounded through
    Kyuden Gotei, home of the Mantis Clan. Come, son of Gusai and of Yoshitsune. Give me your twenty strongest samurai,
    and I will take them to Volturnum to fight the Shadow.


    Your twenty strongest samurai. Yoritomo removed his helm, looking across his lands'' battered beaches. The last
    few Mantis samurai—wearily, bloodied, and beaten by the Phoenix—turned their eyes toward him. They were prepared
    to fight once more—and to die, if he but asked them. Twenty bushi to save the Empire … and if they went to war
    now, Yoritomo knew, they would never return from Volturnum and the Shadowlands. Without samurai, the Mantis
    would fall—his clan, his loyal bushi, and all of his accomplishments.


    His clan. His twenty strongest samurai.

    He could not let them go.


    Yoritomo turned to the Dragon, lifting his kamas from their sheaths. "I am my twenty strongest samurai!" he
    roared. "Take me, and I will show you how the Son of Storms faces death!"


    The Dragon rolled through sea foam and salt tears, prepared to work its magic, when another voice echoed from
    beside the Mantis general. Aramasu, Bayushi no more, stood at his father''s side.

    "And I am twenty-one."'
