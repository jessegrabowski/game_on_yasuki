  flavor_text: <i></i>
  back_title: My Life for Yours
  back_flavor: 'When the Empire''s armies met the Shadowlands forces, the Crab Champion roared into the fray beside
    Yasamura''s Hida riders. O-Ushi smashed all enemies who dared approach her hammer "Where is your wall, oni?"
    she yelled. "Where is your cresting wave? We have kept you at bay for a thousand years! Can you not hold us
    for one day?"


    The Shadowlands beasts fled, howling as the Crab legions slaughtered them. Blackened and bruised, O-Ushi turned
    to see a massive oni claw apart Yasamura''s steed. Yasamura landed hard, reeling.


    "No!" O-Ushi shouted, sweeping her hammer toward the beast. She battered its tough carapace, which tore her
    skin. When she gained the upper hand, she raised her hammer for the finishing blow—but the oni twisted aside
    just as she struck. The hammer''s handle shattered and lodged into O-Ushi''s thigh. Screaming, she fell to the
    ground. Blood ran down her leg as she pushed herself to her feet. She would not die on her knees.


    The oni plunged its claws into her neck. O-Ushi felt sharp pain, and then, suddenly, the creature fell, steel
    bursting through its throat from behind. Yasamura''s blade had impaled it. Yasamura helped O-Ushi stand. "I
    owe you my life," he murmured.


    "You once saved me," she said matter-of-factly. "We are even."


    "No. You are worth a thousand deaths." Yasamura held her shoulder a second longer, then let go. "Without you,
    I would march south, as Hida did, and give my life to defeat your enemies."


    O-Ushi smiled with fierce mischief. "You are right—we are not even," she said, eyes shining. "You have saved
    two lives this day."'
