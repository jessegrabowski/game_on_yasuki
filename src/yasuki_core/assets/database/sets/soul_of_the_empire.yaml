    Parrying the undead Moto''s savage slash, the battle maiden felt something dark move within her, its Taint responding
    to Tsume''s own. Kamoko''s katana shattered. She fell to her knees, which sank into churned earth. With the
    sweep of Tsume''s sword rising above her, Kamoko looked up through blood and sweat.


    "No, Tsume," she growled. "I would do anything to save my clan from the Darkness you offer them, but you are
    wrong. The only Taint in my soul is the Taint I chose to bear."


    "Then die for them!" Tsume roared, stabbing through her chest with a furious thrust of his katana. "And may
    your last sight be of our victory!"


    Tainted blood pouring from her wound, the Unicorn Thunder gripped Tsume''s wrists with her last strength. Around
    her, undead Moto cut through the Unicorn with rusted blades and sharp cries of victory. Tsume''s mad laughter
    echoed from the Twilight Mountains'' high cliffs.'
