  notes: The SOTE edition had two versions, the Fixed had a regular back, the storyline back was Uncommon.
  rarity: Fixed
  artist: Eric Ren
  flavor_text: <i></i>
  back_title: Rise of Honor
  back_flavor: 'Toshimoko leapt from his grey steed into the heart of the Crane unit, shouting down their fear.
    Though wounded, he struck at the Shadow, carving bone from featureless faces with the swipe of a crystal sword.


    "You are Crane!" he roared, throwing his helmet to the ground. "Even in death you cannot be defeated!" Across
    the battlefield, a horn sounded, and a white-haired spearman raised his weapon in salute to the old warrior.
    Even with a battlefield between them, they fought as a pair.


    One by one, the Crane fell in the Shadow''s onslaught, their pale faces bloodied by the Darkness of Volturnum''s
    guardians. They marched beside Toturi''s legions, gaining strength as their numbers failed, but even with the
    whirling blade of the old sensei beside them, the last of Kuwanan''s samurai fell.


    At last, only one ronin fought beside the old Crane, his single eye gleaming with hatred. Turning as the last
    of the fighters fell, the ronin shouted to his enemy, venom hanging from his words.


    "Ten years ago you took my eye, but we never finished our fight, old man! If I am to die, then I would die knowing
    which of us would have won. Your blade or mine, Toshimoko? And to Jigoku with the Shadow! It will not take our
    souls!"


    Dropping his crystal weapon, the ronin drew his sword in a single stroke ....'
