set: Soul of the Empire
cards:
  - title: Into the Heavens
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, before
      the next time this game a Personality is destroyed, remove him from the game instead; you choose in a case of simultaneous
      destructions. The player who controlled the Personality immediately before his removal gains Honor equal to the Personality's
      printed Force.
    legality:
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Uncommon
    artist: Joachim Gmoser
    flavor: '"Shinjo lifted Kamoko''s still form. ''She will not die,'' the Kami whispered, ''but like me, her place is no longer
      here. She shall live forever among the stars of the night sky-and at my side.''" - from Loss of Innocence, Part V'
    number: 1

  - title: Kolat Courtiers
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    - Kolat
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, take
      the Imperial Favor and lose 4 Honor, which will not negated by Favor actions.
    legality:
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Uncommon
    artist: Michael Phillippi
    flavor: In the throne room of Otosan Uchi, twin courtiers bow before an empty throne. "The Shadow shall have no power here,"
      one whispers, opening a crystal fan. "So right, my sister," the other agrees in a single breath. "Nor shall kami rule.
      Humanity shall lead us, or none at all."
    number: 2

  - title: Moon and Sun
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, each
      player may shuffle an Event in his discard pile into his deck.
    legality:
    - Age of Conquest (Emperor)
    - Hidden Emperor (Jade)
    - Legacy
    - Modern
    - Rain of Blood (Diamond)
    rarity: Uncommon
    artist: William O'Connor
    flavor: '"…And ever after, the Moon and the Sun circled in the heavens, always seeking to finish their final duel. The cycle
      of Atman has begun again, and again the world has found peace." - from Fall and Rebirth, Part VI'
    number: 3

  - title: Public Ridicule
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, all Personalities
      with a trait that causes an Honor loss after they enter play have those traits triggered now as if they had just entered
      play, but any other effects of those traits besides Honor loss do not happen; this is not negation.
    legality:
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Uncommon
    artist: Christina Wald
    flavor: 'At the end, Sanzo wandered the Empire alone, wakizashi as shattered as his mind. Peasants stop to listen to his
      wild tales from time to time, but none would ever know the truth: ambition''s cost; destiny''s pawn.'
    number: 4

