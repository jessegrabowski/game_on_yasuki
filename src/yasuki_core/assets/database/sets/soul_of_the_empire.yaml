  back_title: A Small Price
  back_flavor: 'Around the Empire''s camped legions, tremendous bays of flame burned. Creatures scurried past. Guardians
    stood at every corner, their raised spears shining in the bonfires'' brilliant light. In the darkness of the
    Shadowlands'' edge, an army prepared for dawn.


    Saigorei was the name of the one chosen to lead the small force that would race toward Volturnum when dawn arrived.
    He was the last of Toturi''s faithful, ready to die in service to his lord.


    He heard a disturbance outside his tent and looked out, squinting into the encampment''s brightness. "Who comes?"
    he asked the guard.


    "The Scorpion," came the quietly reply.


    Yojiro and Aramoro. Aramoro remained behind his champion, his eyes dead and cold. A small army stood by, each
    samurai bearing a huge pack. "We wish to parlay," Yojiro said.


    "On the eve of battle?"


    "There will be no battle," Yojiro said. "You cannot fight the Shadow. Your courage does the Emperor honor, but
    your foolishness will destroy the very thing you fight to save. Hitomi has brought you knowledge of the Goju,
    but she has not armed you for this war." Yojiro raised his hand, and the Scorpion army laid down their packs
    and threw them open to reveal a hundred thousand katana, nagamaki, naginata, and arrows—all of purest crystal.
    The weapons reflected the blazing firelight. "The Scorpion will arm the Empire''s clans, because if we do not,
    you will all die in Volturnum. In return, we request only that the clans know that you live not because of their
    honor . . . but because of ours." Yojiro smiled, and the trap was set.


    The Emperor''s servant nodded, and the deal was made.'
