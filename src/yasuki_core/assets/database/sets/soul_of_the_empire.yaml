  rarity: Uncommon
  artist: Ellym Sirac
  flavor_text: <i></i>
  back_title: Seven Dragons
  back_flavor: 'The sky flared, and seven great forms rose, carrying the last of Rokugan''s greatest heroes toward
    Volturnum''s gates. In the monastery, faint chants began. To the far south, a Shadow boiled, blocking the moon''s
    faint light.


    "The Shadow . . . ," Hizuka whispered, afraid. Takao stood at the temple gate and watched the Darkness move.
    To the north, a brilliant flame fell from the sky, its light washing across the land. "And the Sun," Takao added.


    In the temple, the Brotherhood gathered their weapons and prayer beads for the final attack. Takao held out
    his hand, and the bell at the top of the Mountain of the Seven Thunders began to ring. It would not stop until
    the Sun''s rebirth . . . or the Darkness''s consumption of the world.


    "The Shadow must be named," the Lady Moon''s voice came to Takao now, as he had known it would. "If it is defined,
    we can destroy it."


    "Destroy?" Takao smiled. "Destruction only clears the path for new evil, Hitomi. You know that."


    "A name must be chosen, to give it form."


    Into the pause that followed, Takao whispered a single word, unheard under the ringing of the temple bell. A
    stunned moment of enlightenment passed, then came a rush of agreement. The Shadow would receive its answer—a
    simple answer—and would be prevented from opening itself to all things. It would receive the name that would
    shape its existence forever after. No name would be taken from the heavens, nor would its form be stolen from
    the Kami or from the Fortunes.


    Takao smiled. The answer had come, as all things must, from mortal destiny.'
