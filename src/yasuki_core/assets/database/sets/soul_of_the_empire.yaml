  back_title: The Enemy of My Enemy
  back_flavor: 'O-Ushi raised her hammer. Beside her, the Crab tensed for battle against an army of Naga gathered
    at the Shadowlands'' edge.


    "Your people have betrayed us." O-Ushi bit the words off sharply, her distaste apparent. Behind her, her honor
    guard shifted. "Leave our lands, Naga. We do not need your poison to win this war."


    Behind his Qatol, one of the Asp slowly drew forth an arrow. His bow tensed.


    "O-Ushi!" a Crab shouted, throwing his body before hers as the Asp released his shaft. He was too late. The
    arrow passed through O-Ushi''s arm and sank into the chest of a man behind her. The man fell, black blood oozing
    from his wound. As his life ebbed, his features slid into nothing and a Tainted black blade fell from his grasp.


    O-Ushi''s guard stared at their fallen comrade. They had fought with this man, lived with him, known his family.
    And yet . . . he was a Goju.


    "They control our actions, even now," O-Ushi said softly. She turned to the Naga archer, who had lowered his
    bow. "You shot through me."


    "He was behind you," the archer hissed. "I did not want the arrow to fail." He tested his bowstring, and it
    hummed faintly in the thin air. "Had I missed, you would have died at the Goju''s hand, and your Crab would
    have attacked. None of us would have lived to see the true battle. I know where my enemies are." The Naga pointed
    into the Shadowlands.


    O-Ushi nodded. Before the archer could go, she said, "I thought Naga arrows never miss."


    The Naga smiled thinly, displaying his fangs, and said nothing. Then Balash turned and was gone.'
