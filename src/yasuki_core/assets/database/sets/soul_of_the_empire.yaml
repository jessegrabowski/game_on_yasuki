  flavor_text: <i></i>
  back_title: Hitomi's Last Gift
  back_flavor: 'Togashi Hoshi led the Dragon army toward Volturnum''s great stone gates. Darkness thundered around
    them, the sound echoing from their marching feet. They were the first to the city''s gate, where they saw a
    hundred thousand more of the Shadow, some bearing the faces of their ancestors—spirits stolen from Jigoku and
    turned to Goju''s will.


    "Let me drive them from the walls," growled Hitomi Iyojin. "This is the duty for which we were born. This is
    the reason our lady left us behind. We will not fail her—or you."


    Hoshi nodded, and the last of Hitomi''s chosen charged.


    A whisper of wind pushed aside the clouds, and a momentary shaft of moonlight gleamed upon the arch. As the
    light touched the ancient stone, the Dragon smashed the gate open. Some mystic force, drawn from their hands
    and from the moonlight, crushed the stone.


    The Darkness gathered its strength once more. The ise zumi tore at it, falling one by one. As they fell, their
    bodies flared into brilliant light, forcing the Shadow to retreat. It was Hitomi''s last gift, her clan''s last
    weapon against Goju and his servants. They were driving back the Shadow at last.


    As the Empire''s armies burst into cheers and flooded into the city, the Dragon legions raised a mighty war
    cry. With the Crab and Lion armies, they drove the Goju before them, shattering the Shadow''s hold. But as they
    neared the ancient archway to Jigoku, Hoshi heard a bitter, echoing laugh. The Darkness swarmed around Oblivion''s
    Gate, whispering like the buzz of stinging flies.


    "You may capture my city," the First Goju smiled, "but you cannot rebuild what I have already destroyed."'
