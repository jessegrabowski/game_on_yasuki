  notes: The SOTE edition had two versions, the Fixed had a regular back, the storyline back was Uncommon.
  rarity: Fixed
  artist: Michael Phillippi
  flavor_text: <i></i>
  back_title: Dealing with Darkness
  back_flavor: '"Now!" Kamoko gasped, gripping the Moto general''s bone wrists and ignoring the lancing pain through
    her chest. Pulling herself up and tightening her grip, she felt his steel slide further through her body. She
    opened her eyes resolutely. "Fulfill your bargain!"


    Tsume''s skull was empty, uncomprehending, until he saw a darker presence move within Kamoko''s soul. Kamoko
    was not speaking to him. A voice wailed, and the Taint began to slide from Kamoko''s body into his. Tendrils
    of Darkness clutched his bone arms, wrapping fleshy tentacles around his chest. Squeezing. Destroying.


    "The Taint you feel is not hers, but mine. She is still pure," a voice whispered. "I protected her in exchange
    for this moment –the moment when I could destroy you."


    Tsume snarled and tried to break free, but Kamoko''s grip was as solid as the stone of the mountains around
    them.


    "Akuma has gone to his death at the Lion''s hands," the oni overlord continued, "but your end will not be so
    simple. The skull of Fu Leng should have been mine from the beginning." The Kyoso materialized out of Kamoko,
    sinking her fangs into his rotted flesh and drawing out his power. "Now I shall claim my place at his side."


    Tsume''s skull flared once, twice, shining a ghastly green light across the war-torn plain. As Tsume''s essence
    dissolved into the oni''s growing body, Kamoko sank to the ground. Tsume''s screams faded into nothingness,
    and the Kyoso allowed the body to fall before her vessel''s kneeling form.


    "You have fulfilled our bargain," Kyoso no Oni hissed.

    "But I offer you another, Kamoko-san. Join us . . . and live." She extended her clawed hand, offering a Tainted
    immortality.

    The Unicorn Thunder shook her head. Death stood at her heart. When the end came, Kamoko met it with courageous
    silence.'
