  back_title: Death Lies Waiting
  back_flavor: 'Volturnum''s wide gates lay upon the ground, charred by ancient flames and devastated by the ravages
    of time. Within, the city''s strange streets twisted through thick Darkness—Darkness that moved, that churned.
    Darkness whose empty face contorted in hideous laughter.


    The troops of the Empire marched before the city in pitiful numbers, raising shining swords of light.


    How amusing. How pathetic. Goju laughed. Black lightning arched through the Darkness, illuminating nothing.


    The Lion charged, but tides of Darkness tore apart Motso''s army. The creatures within the Darkness howled in
    glee. Only a shred of the Lion''s numbers remained standing when the wave of Shadow ebbed.


    The Crab charged next, but Goju caught their general in an immense hand and broke him in two with a single squeeze.
    A girl screamed and plunged her crystal weapon into the Goju''s side, but the katana passed through him, spilling
    no blood.


    "Did you truly think it would be so easy?" he asked, hurling her aside. "We control the gate; we control the
    destiny of all who have ever died for your Empire. Your heroes, your failures—all will be forgotten, wiped away
    by the Shadow. Take a final look at your ancestors, samurai, for your fall begins with their deaths."


    The Goju raised his arms once more, and red light cascaded from the heavens. From behind the gate screams began,
    and Jigoku burst into black flames.'
