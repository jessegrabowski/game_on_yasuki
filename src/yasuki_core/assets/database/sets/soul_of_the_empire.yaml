  artist: Chris Arneson
  flavor_text: <i></i>
  back_title: The Broken Blade
  back_flavor: 'Tsukune turned the wakizashi in her hands, marveling at its magnificent detail. Ryoshun had left
    it in her care, to protect the Empire. It had stolen many lives and bloodied many hands.


    The five Elemental Masters stood near, their eyes darting from her hands to the blade, waiting for her to lift
    her mind from Ambition''s sheen. So many had fallen already.


    "The Tenth Kami left this with us for a reason," Hoichu said.


    "It must be guarded. Protected." Tamoko.


    "Dark secrets must be contained if they cannot be destroyed," Tomo said, his voice resonating with the wisdom
    of Jigoku.


    "They must be locked away and forgotten. This lesson scarred the Phoenix once. Let us remember it now."


    Even young Ningen looked worried, and he gently tugged the Phoenix Champion''s sleeve. "Let it go, Tsukune-sama.
    Let it rest."


    It took great effort to comply, to fight the power that the blade held over the mortal part of her soul. With
    shaking fingers, Tsukune lowered the blade back into its sheath. "It is not my place to care for it," she whispered.
    "Let the Elemental Masters take it, and let a great spell be cast upon its resting place."


    Her companions nodded. They were equals now, as it should have been since Shiba first came to the city of Isawa.
    Kneeling to lift the fractured saya from the ground, the Master of Air spoke.


    "Twice has it drawn the blood of an Emperor. Now let the Phoenix bear the burden of its hunger. Let it sleep
    forever, away from mortal hands. It shall harm the Empire no more."'
