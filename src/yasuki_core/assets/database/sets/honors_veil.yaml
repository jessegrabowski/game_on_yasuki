set: Honor's Veil
cards:
  - title: A Common Goal
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, name
      a Clan Alignment other than your own. Until the game ends, your Personalities have +1F while in an army where both yours
      and the named Clan Alignment are present.
    legality:
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    rarity: Uncommon
    artist: Manuel Calderon
    flavor: '"We cannot do this alone," Taiko said. "Will you aid us, Saburo?"'
    number: 1

  - title: A Prophet Revealed
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After your action resolves, if any targets of its Ranged Attacks are still in play, straighten any of your cards
      that the action and combining abilities bowed.Open: Put this Event into play.'
    legality:
    - A Brother's Destiny (Twenty Festivals)
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    - War of the Seals (Onyx Edition)
    rarity: Uncommon
    artist: Jon Hodgson
    flavor: '"You have come to take me to the islands, then?" "No my lady," Okame replied. "We have come to defend your home."'
    number: 2

  - title: Darling of the Season
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the game ends, after a player has lost 5 total points of Honor from other players' cards' effects in one turn, counting
      incremental portions of losses, negate further points lost from such effects that turn, including partially negating portions
      of losses before they would make a player lose more than 5 points.
    legality:
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    rarity: Uncommon
    artist: April Lee
    flavor: '"In every court season, there is one who captures the hearts and minds of those attending. How unfortunate that
      it would be one so immune to our machinations." - Bayushi Nomen'
    number: 3

  - title: Return to the Heavens
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, gain
      two Provinces, which permanently do not hold Dynasty cards, to the left of your leftmost Province. Then, destroy the Province
      this Event resolved from.
    legality:
    - Destroyer War (Celestial)
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    rarity: Rare
    artist: Britt Martin
    flavor: '"If the clans are to learn true honor, it must be done by choice, not fear. Farewell, my friend. Thank you." -
      Isawa Ochiai'
    number: 4

  - title: The Balance Shifts
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the game ands, you have the ability, "Limited: Bow one or more of your target performing Personalities with a total printed
      Force of 6 or greater to take the Imperial Favor."'
    legality:
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    rarity: Uncommon
    artist: Manuel Calderon
    flavor: '"By what right do you do this?" Kyoko demanded. "By the sacred duty of the Lion, who have defended this city for
      centuries," Shunori replied. "The palace shall be protected."'
    number: 5

