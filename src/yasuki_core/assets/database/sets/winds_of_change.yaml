    - Legacy
    - Rain of Blood (Diamond)
    rarity: Uncommon
    artist: Storn A. Cook
    flavor: '"An old man I may be, Atsuki," Yojiro said between gasping between breaths, "but I am still young enough to deal
      with your inept minions."'
