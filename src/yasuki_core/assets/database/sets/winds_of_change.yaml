set: Winds of Change
cards:
  - title: The New Order
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'This Event may not be discarded from play (though its Open action may be negated normally). Players need 10 more
      Honor to win an Honor Victory.Political Open: Destroy your rightmost Province. Put this Event into play.'
    legality:
    - A Brother's Destiny (Twenty Festivals)
    - Destroyer War (Celestial)
    - Four Winds (Gold)
    - Legacy
    - Modern
    - Rain of Blood (Diamond)
    - War of the Seals (Onyx Edition)
    rarity: Rare
    artist: David Horne
    flavor: '"The time has come for the Empire to be reunited," Tsai said to the Legionnaires. "All will bow. Either by choice
      or before the Emperor''s sword."'
    number: 1

  - title: A Champion's Heart
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, you
      permanently gain the ability, "Political Reaction: After another player discards the Imperial Favor as a condition upon
      one of his own effects, bow your target performing Personality with 1 or higher Personal Honor to take the Imperial Favor."'
    legality:
    - Age of Enlightenment (Lotus)
    - Four Winds (Gold)
    - Legacy
    - Rain of Blood (Diamond)
    rarity: Uncommon
    artist: April Lee
    flavor: '"You have proven your valor, Hachi," Kuon said. "Then let me continue to do so," Hachi said. "Let Crab and Crane
      be at peace, my lord."'
    number: 2

  - title: Eloquence
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, permanently
      give a target Courtier Personality the ability, "Political Limited, w: If you have not used the rulebook Lobby ability
      this turn, take the Imperial Favor. You may not use the rulebook Lobby ability."'
    legality:
    - Four Winds (Gold)
    - Legacy
    - Rain of Blood (Diamond)
    rarity: Rare
    artist: Heather Bruton
    flavor: '"Listen to my tale," the storyteller said. "A tale of Four Winds, and the Void between them..."'
    number: 3

  - title: Commanding Favor
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, it enters
      play in your home.Before you discard the Imperial Favor for a Favor action, you may discard this Event from play instead.
    legality:
    - Age of Enlightenment (Lotus)
    - Four Winds (Gold)
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    - Rain of Blood (Diamond)
    - Shattered Empire
    - War of the Seals (Onyx Edition)
    rarity: Rare
    artist: Malcolm McClinton
    flavor: '"The Shogun commands your presence, Hiruma," the Lion said. "Lord Kaneka has need of your family''s unique talents."'
    number: 4

  - title: Contingency Plans
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the game ends, actions on Holdings have +1 Gold Cost (this will add a Gold cost to actions that do not have one).
    legality:
    - Four Winds (Gold)
    - Legacy
    - Rain of Blood (Diamond)
    card_notes: The version that came in the Winds of Change Mantis starter was mistakenly printed with the Rare symbol.
    rarity: Uncommon
    artist: Monte Moore
    flavor: '"Kaneka expected Naseru to offer him an alliance. The Shogun did not expect the alliance to sound so profitable."
      - Bayushi Sunetra'
    number: 5

  - title: No Mercy
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the game ends, if a player who has lost Honor from his own cards is ever at -15 Family Honor or below, he is eliminated
      from the game.
    legality:
    - Four Winds (Gold)
    - Legacy
    - Rain of Blood (Diamond)
    rarity: Rare
    artist: Beth Trott
    flavor: '"I will not fail, father," Tsudao whispered. "I will restore peace to the Celestial Order even if I must drag Fu
      Leng from the heavens myself."'
    number: 6

  - title: Strike Like the Wind
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, after
