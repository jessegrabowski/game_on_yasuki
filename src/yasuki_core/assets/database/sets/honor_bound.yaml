cards:
  - title: An Empty Victory
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      your turn two turns from now begins, after an Action Phase ends, if the active player has one of the two highest Family
      Honor totals or is tied for the highest, he must declare an attack and choose another such player as the Defender, assigning
      at least one unit, if legal.
