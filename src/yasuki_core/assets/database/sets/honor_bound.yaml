    keywords:
    - Unique
    - Imperial
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, each
      player in turn order starting with you may choose a card in his hand. Discard all chosen cards. If exactly one player's
      card has the lowest Focus Value of all those cards, he gains a Province to the left of his leftmost province. If exactly
      one player's card has the highest Focus Value of all those cards, permanently give him +3 maximum hand size, and he draws
      three cards.
