set: Promotional–CWF
cards:
  - title: As the Shadow Falls
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      your second turn from now begins, players will not gain Honor; this is not negation.
    legality:
    - Clan Wars (Imperial)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    artist: Douglas Shuler
    flavor: As the Dragon marched south under the command of the Black Ronin, a terrible darkness fell across the land. Another
      scroll had been opened, and Junzo's madness spread, covering the land in despair. -V.I
    number: 1

  - title: Bonds of Darkness
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the game ends, Shadowlands Personalities have the ability, "Battle: Once per battle, bow a target enemy Shadowlands card."'
    legality:
    - Clan Wars (Imperial)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    artist: Craig Maher
    flavor: Kachiko opened the gates of the palace as the war raged outside, and the Seven Thunders entered. Hoturi, Toturi,
      Kamoko, Hitomi, Tadaka, Yakamo, and Kachiko stood together beside the descendant of Shinsei, prepared to face Fu Leng
      at last. -X.V
    number: 2

  - title: Dragon Sword Is Broken
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, destroy
      an Item with "Ancestral" in its title or as one of its keywords. The player who last controlled it loses 8 Honor.
    legality:
    - Clan Wars (Imperial)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    artist: Bryon Wackwitz
    flavor: After the battle, the swords of the fallen were collected. Among them, the shattered remnants of the Dragon Ancestral
      Katana lay in a puddle of blood, but Hitomi was nowhere to be found. - VI.II
    number: 3

  - title: Setsuban Festival
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    - Festival
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, destroy
      all tokens and created attachments.
    legality:
    - Clan Wars (Imperial)
    - Four Winds (Gold)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    flavor: Plague swept the lands of the Empire, killing crops and slaughtering villages. Though the heimin celebrated the
      Seven Fortunes, only the Kami of disease seemed to hear their prayers. - III.II
    number: 4

  - title: The Celestial Pattern
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, before
      the next Event this game resolves, negate its effects.
    legality:
    - Clan Wars (Imperial)
    - Four Winds (Gold)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    artist: Heather Bruton
    flavor: After the Day of Thunder, three bodies were burned on pyres. Hoturi, Togashi, Tadaka - heroes of an age that will
      never be forgotten. May their sacrifices continue to inspire us in the Age of Man. - X.X
    number: 5

  - title: The Fair Voice of Lies
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, destroy
      all Courtiers, Poets, and Personalities with Political actions.
    legality:
    - Clan Wars (Imperial)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    artist: Christina Wald
    flavor: When they claimed the Emerald Throne, the Scorpion slaughtered the Imperial Court, killing the poets, the ambassadors...
      and the Emperor himself. - I.IV
    number: 6

  - title: The First Scroll Is Opened
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, all players
      must destroy one Spell attached to each of their Shugenja. Permanently give -2C to all Shugenja Personalities who had
      no Spells attached before this Event resolved.
    legality:
    - Clan Wars (Imperial)
    - Hidden Emperor (Jade)
    - Legacy
    errata_text: Erratum via Oracle to correct change of function on CWS MRP.
    rarity: Promo
    artist: Kevin Daily
    flavor: '"The Scorpion have been defeated, and the city is in the hands of the Lion," the soldier cried. "Our Lord Shoju
      is dead!" "Dead...," murmured Junzo. "Then it is time for our final revenege." - II.I'
    number: 7

  - title: The Price of War
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the game ends, Personalities in and out of play have +2 Gold Cost during Dynasty Phases.
    legality:
    - Clan Wars (Imperial)
    - Four Winds (Gold)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    artist: Diana Vick
    flavor: '"The Ancestral Sword of the Lion... yes, I have seen it. It lies in the palace of the Emperor, safe from the thieves
      that once took it from the Akodo. Strange, how Empress Kachiko covets it so." - Kemmei, VIII.II'
    number: 8

