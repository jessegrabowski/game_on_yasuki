set: Test of Enlightenment
cards:
  - title: A Quest Abandoned
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, discard
      any Rings you control, you permanently will not put Rings into play, and, beginning with the player on your left and proceeding
      in turn order, each player may destroy his rightmost Province. If any player does not, he permanently may not win an Enlightenment
      Victory.
    legality:
    - Age of Enlightenment (Lotus)
    - Legacy
    rarity: Fixed
    artist: Ed Cox
    flavor: '"Enough games. The throne cannot remain unprotected."'
    number: 1

  - title: Curfew Declared
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, it enters
      play in your home.Limited: Discard this Event from play to name "Follower", "Item", or "Spell". Bow all cards of the named
      type. Cards of that type will not straighten until your next turn begins.'
    legality:
    - Age of Enlightenment (Lotus)
    - Legacy
    rarity: Fixed
    artist: John Donahue
    flavor: '"All loyal citizens shall remain in their homes after sunset, for their own protection." - Magistrate''s Decree'
    number: 2

  - title: Festival of Inari
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    - Festival
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      your next turn ends, Unaligned Human Personalities have +2F; also, Farm, Ashigaru, and Peasant cards in and out of play
      have their Gold Costs reduced to 1, and have the trait, "w: Produce 1 Gold."'
