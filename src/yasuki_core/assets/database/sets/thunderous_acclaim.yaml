  - title: A Vision Imparted
    type: Event
    deck: Dynasty
    text: 'You have the ability, "Open: Give a target face-up card in your Province Kharmic."Open: Put this Event into play.'
    legality:
    - A Brother's Destiny (Twenty Festivals)
    - Legacy
    - Modern
    - War of the Seals (Onyx Edition)
    rarity: Rare
    artist: Felipe Gaona
    flavor: The certainty of the Heavens rained down upon the mortal mind of a man named Enomoto, and he was shattered by it.
      Far away, the aged monk Hira felt something stir within him. "What… what is this I see?" he wondered idly. "What is happening?"
