  - title: Blood War
    type: Other
    deck: Other
    text: '2003The dreaded Bloodspeaker, the unholy sorcerer known as Iuchiban, rose from the grave for the second time to challenge
      the sovereignty of the ruling Dynasty and plunged the Empire into darkness through the sinister workings of his cult,
      the Bloodspeakers. His very existence was such a disruption to the natural order that the Spirit Realms opened up and
      allowed one hero to return to the mortal realm to counter his darkness: Hida Kisada, the Great Bear of the Crab Clan.
      Through the sheer force of will of Kisada and the raw power of Isawa Sezaru, brother to the Emperor, Iuchiban and his
      cult were eventually undone.'
    rarity: Fixed
    number: 29

  - title: Era of Enlightenment
    type: Other
    deck: Other
    text: 2005Prompted by the arrival of a great prophet, the descendant of Shinsei, the Empire came under a fevered enthusiasm
      for seeking enlightenment, the mythical state of absolute oneness with the universe. Even though the prophet was murdered
      by the Shadowlands, some did find enlightenment through his teachings, and those of his vassals, the Keepers of the Elements.
      Sadly, the quest for enlightenment leads to the death of Emperor Toturi III at the legendary Tomb of the Seven Thunders,
      deep in the Shadowlands.
    rarity: Fixed
    number: 30

  - title: One Thousand Years of Darkness
    type: Other
    deck: Other
    text: 2002Somewhere in a distant realm the dreams of a thwarted god take shape, and a realm where Fu Leng was victorious
      in the Clan War is born. Ruled by a corrupted god made flesh, this Rokugan is a tortured and miserable place, where the
      people suffer for no reason other than that it amuses their malevolent masters. Only the aged ronin Toturi and a handful
      of his allies, some quite unexpected, have any chance of overthrowing the Dark Emperor and restoring the world to its
      natural state.
    rarity: Fixed
    number: 31

  - title: Race for the Throne
    type: Other
    deck: Other
    text: 2007With the Emperor dead, and his family lost in battle with no clear line of succession, the throne sits empty once
      again. Rather than throw their armies into battle with one another, the Great Clans instead attempt to accrue sufficient
      political, economic, and military might to claim the throne, securing their place as the ruling clan of Rokugan. Unknown
      to mortals, however, the Celestial Heavens have grown tired of man's folly and plan to restore the proper Celestial Order.
    rarity: Fixed
    number: 32

  - title: Saga of the Clan War
    type: Other
    deck: Other
    text: 1995The dark god Fu Leng, unwittingly released from his prison, possessed the young Emperor, pitting the clans against
      one another in a bid for the throne. The forces of the Shadowlands ravaged the Empire, keeping the clans on the defensive
      until the Black Lion, a ronin warrior named Toturi, began uniting sympathetic forces under his banner. It was Toturi who
      led the Seven Thunders to defeat Fu Leng and it was Toturi who sat upon the throne when the Clan War was at last ended.
    rarity: Fixed
    number: 33

  - title: Saga of the Four Winds
    type: Other
    deck: Other
    text: 2001The Emperor lay dead, murdered by the Shadowlands, having never declared his chosen successor. His four children,
      known as the Sword, the Wolf, the Anvil, and the Bastard, each set their sights upon the throne, albeit for vastly different
      reasons. The support of the clans was divided among them, and war, while tragic, was inevitable. The Dark Lord of the
      Shadowlands, the man responsible for the Emperor's death, sought to exploit the situation, but the Sword sacrificed herself
      to end his machinations. In the end, the Anvil sat upon the throne, served by his two surviving siblings.
    rarity: Fixed
    number: 34

  - title: Scorpion Clan Coup
    type: Other
    deck: Other
    text: 1997Driven by a prophecy of terrifying proportions, the Scorpion Clan Champion Bayushi Shoju enacts a bold and ultimately
      tragic plan to save the Empire from certain doom. Shoju assassinates his greatest friend, the Emperor Hantei XXXVIII,
      and seizes control of the Imperial City. The Great Clans band together against him, but Shoju's brilliant and unorthodox
      tactics hold out until, he hopes, the Crab Clan will arrive and support his bid for the throne. Sadly for the Scorpion,
      the Crab do not support Shoju's coup, and the Scorpion are undone by the arrival of the Lion Champion, previously thought
      dead by Shoju's scheming.
    rarity: Fixed
    number: 35

  - title: War Against the Darkness
    type: Other
    deck: Other
    text: 1998An ancient, unknown force called the Lying Darkness abducted the Emperor Toturi I, leaving the Empire in chaos.
      The clans blamed one another. Adding to the chaos, the clans each had conflicts among their own ranks. The faceless shadow
      minions of the Darkness sowed discord even among the Heavens. When the conflict was at last at an end, the Lady Sun and
      Lord Moon were dead, replaced by mortals, and the Spirit Realms had spilled forth a vast army into the mortal realm.
    rarity: Fixed
    number: 36

  - title: War of Spirits
    type: Other
    deck: Other
    text: 2000A vast army of spirits, the souls of samurai released from the Spirit Realms, united under the banner of the spirit
      Hantei XVI, the despot also known as the Steel Chrysanthemum. The tyrant demanded that the current Emperor relinquish
      his throne, but he refused, and war consumed the Empire as samurai took up arms against one another. Surely no other war
      has so badly damaged the people of Rokugan, who were forced to take up arms against their own ancestors in defense of
      their beloved Emperor.
    rarity: Fixed
    number: 37

  - title: What Is Yet to Come
    type: Other
    deck: Other
    text: 2009The false Sun and Moon have fallen from the sky, replaced by true children of the Heavens. A new Emperor sits
      upon the throne, with the Voice of the Jade Sun at his right hand and the Voice of the Obsidian Moon at his left. The
      clans have had no choice but to recognize the clear mandate of the Celestial Heavens, and all have knelt and renewed their
      oaths of fealty to the new Dynasty. Yet shadows grow ever darker in the deepest forests, a clan of renegades hide in the
      forgotten places, a brilliant flame burns brightly in the mountains, and somewhere in the Empire the treacherous Ebon
      Daughter enacts the sinister plots of her master.
    rarity: Fixed
    number: 38
