- cardid: 11350
  title: Saga of the Clan War
  types:
  - Other
  decks:
  - Other
  text: 1995<br>The dark god Fu Leng, unwittingly released from his prison, possessed the young Emperor,
    pitting the clans against one another in a bid for the throne. The forces of the Shadowlands ravaged
    the Empire, keeping the clans on the defensive until the Black Lion, a ronin warrior named Toturi,
    began uniting sympathetic forces under his banner. It was Toturi who led the Seven Thunders to defeat
    Fu Leng and it was Toturi who sat upon the throne when the Clan War was at last ended.
  printing_id: '1'
  rarity: Fixed
- cardid: 11351
  title: Scorpion Clan Coup
  types:
  - Other
  decks:
  - Other
  text: 1997<br>Driven by a prophecy of terrifying proportions, the Scorpion Clan Champion Bayushi Shoju
    enacts a bold and ultimately tragic plan to save the Empire from certain doom. Shoju assassinates
    his greatest friend, the Emperor Hantei XXXVIII, and seizes control of the Imperial City. The Great
    Clans band together against him, but Shoju's brilliant and unorthodox tactics hold out until, he hopes,
    the Crab Clan will arrive and support his bid for the throne. Sadly for the Scorpion, the Crab do
    not support Shoju's coup, and the Scorpion are undone by the arrival of the Lion Champion, previously
    thought dead by Shoju's scheming.
  printing_id: '1'
  rarity: Fixed
- cardid: 11352
  title: War Against the Darkness
  types:
  - Other
  decks:
  - Other
  text: 1998<br>An ancient, unknown force called the Lying Darkness abducted the Emperor Toturi I, leaving
    the Empire in chaos. The clans blamed one another. Adding to the chaos, the clans each had conflicts
    among their own ranks. The faceless shadow minions of the Darkness sowed discord even among the Heavens.
    When the conflict was at last at an end, the Lady Sun and Lord Moon were dead, replaced by mortals,
    and the Spirit Realms had spilled forth a vast army into the mortal realm.
  printing_id: '1'
  rarity: Fixed
- cardid: 11353
  title: War of Spirits
  types:
  - Other
  decks:
  - Other
  text: 2000<br>A vast army of spirits, the souls of samurai released from the Spirit Realms, united under
    the banner of the spirit Hantei XVI, the despot also known as the Steel Chrysanthemum. The tyrant
    demanded that the current Emperor relinquish his throne, but he refused, and war consumed the Empire
    as samurai took up arms against one another. Surely no other war has so badly damaged the people of
    Rokugan, who were forced to take up arms against their own ancestors in defense of their beloved Emperor.
  printing_id: '1'
  rarity: Fixed
- cardid: 11354
  title: Saga of the Four Winds
  types:
  - Other
  decks:
  - Other
  text: 2001<br>The Emperor lay dead, murdered by the Shadowlands, having never declared his chosen successor.
    His four children, known as the Sword, the Wolf, the Anvil, and the Bastard, each set their sights
    upon the throne, albeit for vastly different reasons. The support of the clans was divided among them,
    and war, while tragic, was inevitable. The Dark Lord of the Shadowlands, the man responsible for the
    Emperor's death, sought to exploit the situation, but the Sword sacrificed herself to end his machinations.
    In the end, the Anvil sat upon the throne, served by his two surviving siblings.
  printing_id: '1'
  rarity: Fixed
- cardid: 11355
  title: One Thousand Years of Darkness
  types:
  - Other
  decks:
  - Other
  text: 2002<br>Somewhere in a distant realm the dreams of a thwarted god take shape, and a realm where
    Fu Leng was victorious in the Clan War is born. Ruled by a corrupted god made flesh, this Rokugan
    is a tortured and miserable place, where the people suffer for no reason other than that it amuses
