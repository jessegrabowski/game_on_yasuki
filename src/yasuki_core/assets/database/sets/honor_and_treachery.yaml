      the Scorpion''s shadow was strangling them from within.,Konishi gave the signal, and Chikata felt joy surge in his heart.
      He emerged from the shadows like a dream, and his steel found the throat of a Phoenix sentry. As the man dropped lifeless
      to the ground, Chikata sighed happily. This was his life.'
