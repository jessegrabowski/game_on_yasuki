set: Evil Portents
cards:
  - title: Battle of the First Seal
    type: Event
    deck: Dynasty
    text: 'Open: Dark times are coming. Personalities with 3 or more Personal Honor have -1F. Personalities with 0 Personal
      Honor have +1F.'
    legality:
    - A Brother's Destiny (Twenty Festivals)
    - Legacy
    - Modern
    - War of the Seals (Onyx Edition)
    rarity: Uncommon
    artist: Carlos NCT
    flavor: The Spider's unholy army outnumbered the temple's defenders more than fifty to one. The samurai fought with honor,
      but they could not hold back the dark tide. Renyu and Norimichi's magic tore the world asunder, but when Norimichi fell,
      their defeat was inevitable.
    number: 1

  - title: Ominous Revelation
    type: Event
    deck: Dynasty
    text: 'Invest : The Event may be Unique.Political Open: Search your Dynasty deck for a non-Unique Event not named Ominous
      Revelation and refill this Province with it, face-up.'
    legality:
    - A Brother's Destiny (Twenty Festivals)
    - Legacy
    - Modern
    - War of the Seals (Onyx Edition)
    rarity: Rare
    artist: Jonathan Moore
    flavor: The crowd fell silent as Kozan continued. "The Dark Lord has chosen to renege on his agreement with the Empress.
      The Taint endures… it has only remained hidden."
    number: 2

  - title: War of the Spirit Realms
    type: Event
    deck: Dynasty
    text: 'Ninja Open, : You may target and bow a Spell. Search your Fate deck for a Ninja Strategy, show it, and put it in
      your hand. Lose 2 Honor.'
    legality:
    - A Brother's Destiny (Twenty Festivals)
    - Legacy
    - Modern
    - War of the Seals (Onyx Edition)
    rarity: Rare
    artist: J. Edwin Stevens
    flavor: As the ancestral guardians shimmered into existence, the samurai-ko licked her lips anxiously. "This was not in
      the intelligence," she whispered. Then the air shimmered again, and the hungry dead spilled forth. "The Kwanchai's daughter
      will not be harmed!" they hissed.
