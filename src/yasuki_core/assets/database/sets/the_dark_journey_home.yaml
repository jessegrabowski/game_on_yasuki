set: The Dark Journey Home
cards:
  - title: A Kolat Revealed
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    - Kolat
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, bow the
      Stronghold each of player who controls no Kolat cards.
    legality:
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Uncommon
    artist: Randy Gallegos
    flavor: 'His blade sang through Osugi''s body, and all sound ceased. In that instant, Toturi spoke a word that had never
      been heard before in all the courts of Rokugan: "Kolat."'
    number: 1

  - title: Blessings of Isawa
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, after
      the next time this game a Kiho Strategy action that does not copy abilities resolves, if it was performed by a Personality,
      attach the Strategy to them. If it attached, until it leaves play, copy the performed ability onto the Personality removing
      any text allowing it to be taken more than once per turn, it is not considered an attachment, and its abilities cannot
      be used.
    legality:
    - Hidden Emperor (Jade)
    - Legacy
    card_notes: Revised 2024 in an attempt to preserve all contemporary Rulings regarding its odd interactions, with the exception
      of how it interacts with being canceled/unsuccessful as those are no longer Rules concepts.
    rarity: Uncommon
    artist: Bryon Wackwitz
    flavor: '"Never doubt this: we are not the servants of destiny, but the makers of the future." - attributed to Isawa'
    number: 2

  - title: Creating the Monkey Clan
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, after
      the next two times this game an Unaligned Personality is revealed in one of your Provinces, permanently give him your
      Clan Alignment.
    legality:
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Uncommon
    artist: Lissanne Lake
    flavor: '"It is time to make new the old and to destroy those who have been unfaithful. Take your men, and rise against
      the Naga, for they are no longer our allies..." - The Return of Toturi the First'
    number: 3

