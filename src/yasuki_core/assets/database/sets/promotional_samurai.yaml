    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, permanently
      give a Human Personality +2F, +1PH, and the ability, "Reaction: After this Personality wins a duel, or after his army
      destroys a Province or enemy unit in battle resolution, gain 2 Honor."'
    legality:
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    card_notes: Released in the Kotei 2008 pack
    rarity: Promo
    artist: Patrick McEvoy
    flavor: '"The clans have all put forth candidates. But without Heaven''s approval, who can reign?" - Kitsu Katsuko'
    number: 1

