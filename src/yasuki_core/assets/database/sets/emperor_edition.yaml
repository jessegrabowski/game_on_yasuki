    type: Other
    deck: Other
    text: A student of history and tactics, Kisho has studied De Bellis Yoditorum more than any other Lion in his generation,
      and its contents terrify him. The notion of an endlessly vast empire using these tactics on a massive scale drives him
      to see the Lion prepared for what he feels is an inevitable confrontation.
    rarity: Fixed
    number: 433

  - title: Asahina Michiru (Bio)
    type: Other
    deck: Other
    text: Michiru is often seen traveling around the Crane lands advising lords and seeing that all the shrines and temples
      are cared for. She is completely devoted to her family's doctrines of peace, but she is quick to point out that this does
      not require her to be helpless.
    rarity: Fixed
    number: 434

  - title: Asahina Yasutora (Bio)
    type: Other
    deck: Other
    text: Though he dislikes all weapons on principle, Yasutora takes great care of his wakizashi and is never seen in public
      without it. He inherited it from his mother's father, a Kakita swordsman of some note, and he is determined to show proper
      filial piety towards it.
    rarity: Fixed
    number: 435

  - title: Bayushi (Bio)
    type: Other
    deck: Other
    text: The manipulative Bayushi was vastly different from his twin brother Shiba, and delighted in deceit and trickery. He
      deliberately lost his first round in the Celestial Tournament to see who would become Emperor because he felt his talents
      lay elsewhere. Bayushi disappeared from the mortal realm after the loss of his beloved Shosuro to the Nothing.
    rarity: Fixed
    number: 436

  - title: Bayushi Hurunayi (Bio)
    type: Other
    deck: Other
    text: Hurunayi is a well known courtier with standing invitations in a number of courts across the Empire. No one outside
      the clan suspects his amazing prowess at smuggling weapons into secure locations and putting them to terrible use when
      the time comes.
    rarity: Fixed
    number: 437

  - title: Bayushi Manami (Bio)
    type: Other
    deck: Other
    text: Under different circumstances, Manami would be a man of honor. As it is, he is devoted beyond reproach. He does not
      falter when required to commit questionable acts, despite that he wishes otherwise. He is eagerly sought as a husband
      by many powerful courtiers, but as of yet his value as a yojimbo is too great.
    rarity: Fixed
    number: 438

  - title: Bayushi Mitsuo (Bio)
    type: Other
    deck: Other
    text: Some believe that Mitsuo shares a karmic bond with his uncle, who disappeared days before Mitsuo was born. It has
      been a burning obsession to discover the truth about Bayushi Muhito since Mitsuo's gempukku, and he strongly suspects
      that a Crane samurai-ko was involved in some way.
    rarity: Fixed
    number: 439

  - title: Bayushi Nitoshi (Bio)
    type: Other
    deck: Other
    text: Bayushi Nitoshi, the Poison Mask, is a sensation throughout the courts of Rokugan. He charms and manipulates with
      a simple look, but inside he feels nothing. His father's disgrace when he was but a child has dominated his life, leaving
      him utterly incapable of feeling compassion for others.
    rarity: Fixed
    number: 440

  - title: Bayushi Waru (Bio)
    type: Other
    deck: Other
    text: A difficult and belligerent yojimbo, Waru never lacks for courtiers seeking his protection despite his temperament.
      His record is spotless, having never backed down from a challenge or failed to defend his lord's honor. One day, he will
      be ordered to lose a duel, and his purpose will be fulfilled.
    rarity: Fixed
    number: 441

  - title: Charity
    type: Other
    deck: Other
    text: AEG and L5R players have always been conscious about issues effecting the real world outside of the games. Through
      charity events and special charity cards like Stone of Remembrance, we hope we can do more than simply play a game.Visit
      www.alderac.com/charity for information on the various ways you can help!
    rarity: Fixed
    number: 442

  - title: Customer Service
    type: Other
    deck: Other
    text: For any and all issues related to L5R or any AEG game, please contact customerservice@alderac.com. Customer Service
      also handles event requests, convention requests, and more. AEG Customer Service promises a prompt reply and attempts
      to resolve every situation to the customer's satisfaction.
    rarity: Fixed
    number: 443

  - title: Daidoji Ebizo (Bio)
    type: Other
    deck: Other
    text: Very few people outside of the Daidoji know who Ebizo is, and he prefers it that way. Being talked about just makes
      his task harder, and tracking down criminals and other assorted troublemakers is hard enough. His family and his lord
      know his skill, and that is all that matters.
    rarity: Fixed
    number: 444

  - title: Daidoji Masafuni (Bio)
    type: Other
    deck: Other
    text: As a child, Masafuni realized that the higher up he was, the more he could see. As a scout in the Crane armies, he
      has embraced this insight by using hills and mountains as observation points. Climbing in armor is not easy, but he takes
      pride in the skill he has developed.
    rarity: Fixed
    number: 445

  - title: Daidoji Tametaka (Bio)
    type: Other
    deck: Other
    text: Tametaka is a devoted student of history and he has observed that internal peace is something of a rarity in the Empire.
      He doesn't know when the next war to involve the Crane will start, but part of him hopes it will happen soon. Then the
      suspense will be over.
    rarity: Fixed
    number: 446

  - title: Daigotsu (Bio)
    type: Other
    deck: Other
    text: A corrupted scion of the Hantei line, Daigotsu was captured by the Bloodspeakers to create a weapon against the Empire.
      Instead he became the greatest lord of the Shadowlands ever known, and ascended to a position of divine evil to lead the
      Spider Clan from beyond the mortal realm.
    rarity: Fixed
    number: 447

  - title: Daigotsu Bofana (Bio)
    type: Other
    deck: Other
    text: Bofana is alleged to have traveled in the Northern Steppes to find the reclusive Dark Oracle of Fire and acquire his
      blessings. Whether this is truth or rumor none can say, but there is no denying that fire burns in Bofana's eyes, and
      his wrath consumes all before it like a wildfire.
    rarity: Fixed
    number: 448

  - title: Daigotsu Gyoken (Bio)
    type: Other
    deck: Other
    text: Gyoken was born among the Lost some years before the Spider Clan came into existence, and was among the first to take
      his gempukku while bearing the mon. He has earned the Spider great glory, fighting duels and earning blood feuds with
      three clans. Among the other clans, he is both feared and hated.
    rarity: Fixed
    number: 449

  - title: Daigotsu Ishibashi (Bio)
    type: Other
    deck: Other
    text: Ishibashi succeeded Daigotsu Shiraki, longest-serving officer in the Spider armies, as gunso of a squad of heavy infantry.
      He strives to rule as his predecessor did, with the same unshakable resolve that made her a hero. So far his command has
      been extremely effective, but he craves even greater success.
    rarity: Fixed
    number: 450

  - title: Daigotsu Kanpeki (Bio)
    type: Other
    deck: Other
    text: Called by some the Shadow Emperor, the son of Daigotsu has come of age and taken control of his clan with a strong
      hand and an iron will. Those who hoped his Imperial training would tame him have found themselves sorely disappointed,
      for Kanpeki is the soul and embodiment of the Spider Clan.
    rarity: Fixed
    number: 451

  - title: Daigotsu Kendo (Bio)
    type: Other
    deck: Other
    text: As a sharp contrast to his rival Misaki, Kendo is a smooth and manipulative leader. He addresses his men before every
      engagement, extorting them to greater achievements for which he generally claims all the glory. Some of his men despise
      him, but most are so swayed by his charisma that they adore him.
    rarity: Fixed
    number: 452

  - title: Daigotsu Matsuda (Bio)
    type: Other
    deck: Other
    text: Matsuda's father was a villainous madman who created a pair of terrible gauntlets known as the Obsidian Claws. Many
      believed they were Kurai's actual hands, which may yet be true, but Matsuda bears them now regardless. In his hands they
      are no less deadly than in his father's.
    rarity: Fixed
    number: 453

  - title: Daigotsu Misaki (Bio)
    type: Other
    deck: Other
    text: Born of the Crane, Misaki has abandoned everything associated with his former clan, cultivating an appearance that
      a Crab might envy. He lusts for the glory of battle, and the ambitious and bloodthirsty flock to his banner. His conquests
      in the Colonies are among the greatest of all Spider lords.
    rarity: Fixed
    number: 454

  - title: Daigotsu Negishi (Bio)
    type: Other
    deck: Other
    text: Negishi is often silent, but his actions speak volumes. He follows every order without question, completing his duties
      quickly and moving to aid others with theirs. He is universally well regarded among his fellow Spider, the closest thing
      many of them have to a true friend.
    rarity: Fixed
    number: 455

  - title: Doji (Bio)
    type: Other
    deck: Other
    text: The Lady Doji single-handedly created the social customs and rituals of Rokugan, mimicking the order and elegance
      of the Celestial Heavens in the mortal realm. She loved and married a mortal, and after his death and the deaths of their
      children, she gave herself to the sea to be with them once more.
    rarity: Fixed
    number: 456

  - title: Doji Dainagon (Bio)
    type: Other
    deck: Other
    text: 'Dainagon''s love of beautiful fabrics and her boldness in combining them has touched off multiple fashion trends
      since her arrival to the Crane courts. She enjoys the fame this has brought her, as it advances her to her ultimate goal:
      a post in the Imperial court in Toshi Ranbo.'
    rarity: Fixed
    number: 457

  - title: Doji Makoto (Bio)
    type: Other
    deck: Other
    text: Smiling and gracious, Makoto is the image of the perfect Doji lord. The Crane are still recovering from the horrors
      of the Destroyer War, and he is determined to lead his clan to a glorious future. Those who have watched him in court
      do not doubt that he could do it.
    rarity: Fixed
    number: 458

  - title: Doji Shunya (Bio)
    type: Other
    deck: Other
    text: With an Otomo mother and a Doji father, politics runs in Shunya's veins. He cultivates the appearance of being a hopeless
      romantic - sending poems brushed onto rose petals is a specialty - but the women he courts are always ones who can help
      him in his current project.
    rarity: Fixed
    number: 459

  - title: Doji Tatsuki (Bio)
    type: Other
    deck: Other
    text: The daughter of a Doji vassal family, Tatsuki showed a gift for politics at an early age. Taken on as a student by
      the famed Doji Ayano, she is expected to reach the same glorious heights as her teacher. It is a challenge Tatsuki knows
      she can meet.
    rarity: Fixed
    number: 460

  - title: Earth
    type: Other
    deck: Other
    text: Collect 3 Earth cards and get a special Ring of Earth promotional card.Collect all 5 of these special Ring cards and
      get a unique promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 461

  - title: Experience a Personality
    type: Other
    deck: Other
    text: This starter deck contains 8 different non-Champion personalities from your Clan, each with its own short background
      information written on a special card. Select your favorite, save their background card, and help him or her get an experienced
      version in a future expansion.Visit www.L5R.com for all of the details.
    rarity: Fixed
    number: 462

