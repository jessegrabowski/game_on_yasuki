      get a unique promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 463

  - title: Forgotten Legacy
    type: Other
    deck: Other
    rarity: Fixed
    number: 464

  - title: Glory of the Crab
    type: Other
    deck: Other
    text: Collect 5 Glory of the Crab cards and get a special Crab promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 465

  - title: Glory of the Crane
    type: Other
    deck: Other
    text: Collect 5 Glory of the Crane cards and get a special Crane promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
