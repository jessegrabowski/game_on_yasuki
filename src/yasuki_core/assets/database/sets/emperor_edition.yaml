  - title: Glory of the Mantis
    type: Other
    deck: Other
    text: Collect 5 Glory of the Mantis cards and get a special Mantis promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 469

  - title: Glory of the Phoenix
    type: Other
    deck: Other
    text: Collect 5 Glory of the Phoenix cards and get a special Phoenix promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 470

  - title: Glory of the Scorpion
    type: Other
    deck: Other
    text: Collect 5 Glory of the Scorpion cards and get a special Scorpion promotional card.Visit www.L5R.com for all of the
      details.
    rarity: Premium
    number: 471

  - title: Glory of the Spider
    type: Other
    deck: Other
    text: Collect 5 Glory of the Spider cards and get a special Spider promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 472

  - title: Glory of the Unicorn
    type: Other
    deck: Other
    text: Collect 5 Glory of the Unicorn cards and get a special Unicorn promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 473

  - title: Hida (Bio)
    type: Other
    deck: Other
    text: The strongest and most fearsome of the Kami, Hida lived and died without ever feeling weakness or fear. He led his
      followers in the defense of the Empire against the Shadowlands, and only truly died after venturing into Fu Leng's realm
      in search of his lost son Atarasi, whom he slew before succumbing to wounds inflicted by his corrupted son.
    rarity: Fixed
    number: 474

  - title: Hida Bushotsu (Bio)
    type: Other
    deck: Other
    text: Bushotsu is the eldest in a generation of berserkers, having lived longer than any of his comrades-in-arms. He is
      respected for his prowess and feared for his fury, because while in its throes he cannot distinguish between friend and
      foe. In the moments between battles, he is filled with self-loathing.
    rarity: Fixed
    number: 475

  - title: Hida Horu (Bio)
    type: Other
    deck: Other
    text: Horu is one of the senior Crab warriors stationed in the Scorpion lands near the New Pit. He is not particularly well
      regarded at home, as most find him opportunistic and obnoxious. The Scorpion find him agreeable, however, since they see
      such qualities as signs that he can be manipulated if the need arises.
    rarity: Fixed
    number: 476

  - title: Hida Kisada (Bio)
    type: Other
    deck: Other
    text: The Crab Champion took his legendary great-grandfather's name. Despite his relatively small size, he is celebrated
      as one of Rokugan's greatest swordsmen, and is feared by a great many men. Kisada remembers the wars of his youth, but
      longs for a chance to prove the greatness of the Crab.
    rarity: Fixed
    number: 477

  - title: Hida Mimori (Bio)
    type: Other
    deck: Other
    text: Even among the berserkers, Hida Mimori is known for his temperament. As a young man, the death of his wife devastated
      him and left no room in his heart for anything except rage. His children have not seen him in years, for he does not wish
      them to see what he has become.
    rarity: Fixed
    number: 478

  - title: Hida Takeuchi (Bio)
    type: Other
    deck: Other
    text: Takeuchi is remarkably pleasant, for a Crab warrior. He is jovial and has a strong sense of humor. The recent complacency
      among the Crab troubles him greatly, however. He feels the only way to avoid losing himself is to exorcise his personal
      demons with regular battle.
    rarity: Fixed
    number: 479

  - title: Hida Yamadera (Bio)
    type: Other
    deck: Other
    text: Yamadera was a member of the Hida Elite Guard until the Destroyer War, at which point he was Tainted by the weapons
      of the Destroyer horde. The Taint has supernaturally extended his life, and despite his years, he remains young and fit
      for battle. Sadly, this only ostracizes him further.
    rarity: Fixed
    number: 480

  - title: Ikoma Shika (Bio)
    type: Other
    deck: Other
    text: Shika was never a strong student but her affinity with the natural world was astounding. In her, the Lion saw great
      aptitude that would be squandered if she was judged by normal standards, so instead they allowed her to nurture her understanding
      of the wilderness in order to gain advantage from it.
    rarity: Fixed
    number: 481

  - title: Ikoma Shinju (Bio)
    type: Other
    deck: Other
    text: Shinju has a ruthlessness that concerned her instructors but excited her commanders. She is absolutely single-minded
      when in battle and will stop at nothing, short of breaking her oaths of bushido, to achieve victory. The thought that
      the land won will be of no use after victory does not concern her at all.
    rarity: Fixed
    number: 482

  - title: Ikoma Sugo (Bio)
    type: Other
    deck: Other
    text: Sugo's pride in the Lion Clan borders on obsession. He truly believes that any samurai of a different clan must secretly
      wish they were Lion, or else they are too ignorant to understand the superiority of his clan. He tries to not look down
      upon them, but it is difficult.
    rarity: Fixed
    number: 483

  - title: Isawa Shunsuko (Bio)
    type: Other
    deck: Other
    text: Shunsuko was born on the day the Empress uttered her proclamation to the Spider Clan, and she grew up hearing stories
      of the adventures to be had in the colonies. Her one fixed ambition is to be granted a position at one of the Second City
      temples.
    rarity: Fixed
    number: 484

  - title: Isawa Tamaki (Bio)
    type: Other
    deck: Other
    text: Tamaki's father was a healer for the Phoenix armies during the War of the Twins, and she intends to follow his example
      of aiding in the defense of the clan. She would never use Void magic directly on another person, but she looks for ways
      of using it in battle.
    rarity: Fixed
    number: 485

  - title: Isawa Tomohiro (Bio)
    type: Other
    deck: Other
    text: Tomohiro was born into a Shiba ji-samurai family. When her shugenja talents were discovered, the Isawa suggested that
      she be adopted into their family, and her parents agreed. Tomohiro missed her birth family at first, but as her talents
      matured she realized that in the void there was no distance between them.
    rarity: Fixed
    number: 486

  - title: Kaiu Esumi (Bio)
    type: Other
    deck: Other
    text: Esumi's mother was a Yasuki before her marriage, and her hand in raising Esumi is clear. He is materialistic in the
      extreme, and his wrathful nature with the imprisoned mujina he supervises is terrible even to the most jaded bushi. The
      creatures' anguish only entertains him.
    rarity: Fixed
    number: 487

  - title: Kaiu Nakano (Bio)
    type: Other
    deck: Other
    text: At the dawn of the new era, Kaiu Nakano is among the eldest and most venerable of all the Kaiu engineers. His efforts
      in rebuilding the Crab lands have placed every family in his debt, but he cares nothing for political clout. To Nakano,
      the beauty of stone is all that matters.
    rarity: Fixed
    number: 488

  - title: Kaiu Watsuki (Bio)
    type: Other
    deck: Other
    text: Watsuki cares only to be challenged. He takes pride in his work only insomuch as he delights in others being unable
      to find flaws in his creations. Those who wish to gain his assistance must present it as an insurmountable challenge in
      order to pique his interest; once that is done, the matter is as good as finished.
    rarity: Fixed
    number: 489

  - title: Kunji (Bio)
    type: Other
    deck: Other
    text: Spirit-creatures frequently visit the Empire, but few make their presence known. Kunji was visiting a shrine in the
      Phoenix lands when the Army of Dark Fire attacked. Offended by the impiety, Kunji aided the shrine's defenders and was
      dazzled by their heroism. No one knows how long it will stay.
    rarity: Fixed
    number: 490

  - title: Matsu Arata (Bio)
    type: Other
    deck: Other
    text: Arata is a student of an ancient and honored tradition, that of the justicar. She seeks fugitives from justice, both
      within the Lion lands and beyond, and seals both their guilt and their life in a duel. She has never been defeated, which
      only assures her that her cause is just.
    rarity: Fixed
    number: 491

  - title: Matsu Hachiro (Bio)
    type: Other
    deck: Other
    text: Hachiro has never showed any desire for glory or rank. He has never expressed any personal ambition or drive. Yet,
      given the opportunity to fight on behalf of the Lion, he never falters. His desire to bring about the death of his enemies
      may never lead to a position of authority, but the accolades still come.
    rarity: Fixed
    number: 492

  - title: Mirumoto Shikei (Bio)
    type: Other
    deck: Other
    text: The Dragon Champion is a remarkable man, loved by virtually all who have met him. He is often called the Laughing
      Dragon due to his demeanor, but his Naga ancestry and his mystical tattoos remind others that he is not quite like them,
      no matter how hearty his laugh or genuine his smile.
    rarity: Fixed
    number: 493

  - title: Moshi Madoka (Bio)
    type: Other
    deck: Other
    text: Madoka is a disciplined and conservative young woman who rarely speaks unless asked a question. She is highly principled
      and much respected among her family for her strong moral fiber. She considers her time among the Yoritomo like that of
      a missionary, bringing order to those who have it not.
    rarity: Fixed
    number: 494

  - title: Moshi Yokohime (Bio)
    type: Other
    deck: Other
    text: 'Yokohime is as one with the elements, surrendering herself utterly to them when the time comes for her power to be
      called upon. She regards this as the ultimate duty of a true priestess: to surrender herself to the power of the sea so
      that it might demonstrate its will in the mortal realm.'
    rarity: Fixed
    number: 495

  - title: Moto Hailung (Bio)
    type: Other
    deck: Other
    text: The Moto family cleansed their great shame decades ago, but Hailung has never forgotten that the Dark Moto once served
      the Shadowlands. He maintains vigil against corruption and fights alongside those who protect the Empire from Jigoku.
      He treats the Crab with more respect than the rest of the Empire.
    rarity: Fixed
    number: 496

  - title: Moto Naleesh (Bio)
    type: Other
    deck: Other
    text: Naleesh's life changed drastically as a young girl, when the shugenja of her clan discovered she was the reincarnated
      soul of their Kami, Shinjo. Naleesh feels like a normal human. Despite the great expectations on her shoulders, she remains
      a cheerful and confident woman.
    rarity: Fixed
    number: 497

  - title: Moto Tetsuo (Bio)
    type: Other
    deck: Other
    text: Tetsuo became a member of the prestigious White Guard at an unprecedented young age. Unfortunately, he often feels
      like he must overcompensate for the expectations bearing down upon him. Pressure changes him into an irate man. He snaps
      at perceived insults and is quick to anger.
    rarity: Fixed
    number: 498

  - title: Pride of the Hand (Bio)
    type: Other
    deck: Other
    text: Matsu Benika had always trained the great cats that strike fear into the hearts of their opposition, but once she
      gained the Jade Hand, they became even more fearsome. Her ability to make them understand and obey has increased, which
      allows her to unleash their fury, confident that she can regain control.
    rarity: Fixed
    number: 499

  - title: Shiba (Bio)
    type: Other
    deck: Other
    text: None of the Kami were as fiercely intelligent or as soft-spoken as their brother Shiba. Shiba understood the place
      of the Kami in the world, and did not believe himself greater than the mortals he attempted to lead. He humbly knelt and
      swore to protect the Isawa in exchange for their aid, knowing what it would mean for the Empire.
    rarity: Fixed
    number: 500

  - title: Shiba Kataken (Bio)
    type: Other
    deck: Other
    text: Kataken's childhood was made miserable by an older brother who bullied him unmercifully, and the happiest day of his
      life was when he left home for his dojo training. Since then, every foe he has defeated has been more proof that he has
      become stronger and more lethal than his brother.
    rarity: Fixed
    number: 501

  - title: Shiba Ryuba (Bio)
    type: Other
    deck: Other
    text: 'Ryuba is one of the rare Phoenix who loves battle for itself. Coming of age in the War of Dark Fire, she quickly
      decided that life held no certainties so there was no reason to fear death. In combat she embraces her one truth: kill
      or die.'
    rarity: Fixed
    number: 502

  - title: Shiba Sansesuke (Bio)
    type: Other
    deck: Other
    text: Sansesuke can trace his linage back to Shiba-kami himself, and outwardly he is completely dedicated to the Shiba duty
      of defending the clan. In his heart, however, he yearns to put aside the sword and become an artisan. He just needs to
      figure out how to do so honorably.
    rarity: Fixed
    number: 503

  - title: Shiba Tsukimi (Bio)
    type: Other
    deck: Other
    text: Neither age nor the loss of her eyes has dimmed Tsukimi's strength. Though she is past the usual time of retirement
      she continues to serve as the Champion of the Phoenix. "The Void will show me the correct time to step aside," is all
      she will say on the matter.
    rarity: Fixed
    number: 504

  - title: Shinjo (Bio)
    type: Other
    deck: Other
    text: The Lady Shinjo was the most compassionate and gentlest of all the Kami, and the one most loved by her brother Fu
      Leng. His defeat sent her wandering the world in misery, and upon his return he slew her to show the grave nature of his
      campaign against the Heavens. Shinjo has since been reborn into the mortal realm.
    rarity: Fixed
    number: 505

  - title: Shinjo Byung (Bio)
    type: Other
    deck: Other
    text: Byung's parents received three offers of marriage before her twentieth birthday (two from prominent Crane courtiers).
      Byung refused them all. She prefers the freedom and importance of serving in the Junghar army. She is beautiful and witty,
      but she does not recognize her own charm.
    rarity: Fixed
    number: 506

  - title: Shinjo Eun-Sahng (Bio)
    type: Other
    deck: Other
    text: The Shinjo rejoiced at the news that the Kami Shinjo has been reborn, and none more than Eun-Sahng. The bushi is zealously
      devoted to Moto Naleesh, and he would protect her interests with his life and soul. Eun-Sahng always watches out for his
      younger brother, a bushi among the Khol.
    rarity: Fixed
    number: 507

  - title: Shinjo Horibe (Bio)
    type: Other
    deck: Other
    text: Horibe is convinced that the Unicorn hold the most important duties among the Great Clans. His grandfather died to
      Matsu Yoshino's blade and his father perished defending the land against the Destroyers. Duty and honor is paramount to
      young Horibe, though he sometimes is too enthusiastic in proclaiming them.
    rarity: Fixed
    number: 508

  - title: Shinjo Itao (Bio)
    type: Other
    deck: Other
    text: When Itao was a boisterous young man, he ran afoul of a group of rowdy sailors during one drunken night. He harbors
      resentment against the Mantis to this day. He hones his iaijutsu with the hope of one day proving his strength to the
      Mantis in honorable combat.
    rarity: Fixed
    number: 509

  - title: Shinjo Taeken (Bio)
    type: Other
    deck: Other
    text: Taeken is the son of Topaz Champion Shinjo Tae-Hyun. He reveres his father and follows in his footsteps. He graduated
      with top honors, though he did not become the Topaz Champion. He has already distinguished himself to his superiors with
      his quick thinking and natural leadership - all according to plan.
    rarity: Fixed
    number: 510

  - title: Shosuro Hawado (Bio)
    type: Other
    deck: Other
    text: Most agree that Hawado is not entirely human, although the Kuroiban maintain surveillance on her a great deal of the
      time and have not been able to determine that she suffers any spiritual blight or corruption. Her abilities are inexplicable,
      but it has not stopped the Yogo from trying to discover the truth.
    rarity: Fixed
    number: 511

  - title: Shosuro Konishi (Bio)
    type: Other
    deck: Other
    text: Konishi has gained a great deal of notoriety among his family for using shuriken effectively as a weapon rather than
      just a tool for delivering poison. It is said that Konishi can strike a man with ten of them within five seconds, and
      in vital areas such as the eyes.
    rarity: Fixed
    number: 512

  - title: Shosuro Tanzaki (Bio)
    type: Other
    deck: Other
    text: Tanzaki is the head of a very wealthy family of artisans and smiths. He controls how the gifts of his family are distributed
      among the clan, ensuring that those who receive their coveted goods are in his debt. His family has very little military
      might, but they never want for defenders when they are needed.
    rarity: Fixed
    number: 513

  - title: Shosuro Tsuji (Bio)
    type: Other
    deck: Other
    text: A contemporary of the clan's master assassins, Shosuro Aroru and Bayushi Keirei, Tsuji is brute force when the razor's
      edge fails. He slaughters targets, sending clear and visceral messages to those who have earned the clan's disfavor. Aroru's
      targets seem to die of natural causes, but Tsuji's are clearly victims of violence.
    rarity: Fixed
    number: 514

  - title: Tamori Muzu (Bio)
    type: Other
    deck: Other
    text: Muzu appears to be completely without the anger and bitterness that so many of his kinsmen are known for. He fights
      as fiercely as any, but once the battle is finished, he puts away his weapons and tends to those who need aid as a priest
      should, not only allies but sometimes enemies as well.
    rarity: Fixed
    number: 515

  - title: Tamori Tomaru (Bio)
    type: Other
    deck: Other
    text: Tomaru is a dispassionate man, more interested in devising the spells and concoctions the Tamori use against their
      enemies than using them himself. He disappears for weeks at a time into his private study, emerging with all manner of
      new secrets for his family to put to use.
    rarity: Fixed
    number: 516

  - title: Tamori Yayu (Bio)
    type: Other
    deck: Other
    text: Yayu delights in the exploration of the kami's versatility. He rarely spends time in the temple or library, instead
      preferring to immerse himself in the stark wilderness. He finds such environs the perfect place to commune with the kami
      of the earth, the fire, the wind. It seems that the kami reciprocate his respect.
    rarity: Fixed
    number: 517

  - title: The Crab Clan
    type: Other
    deck: Other
    text: We are the sons of Hida. We are the first and only line of defense against the darkness. We are the Empire's wall,
      its shield, its armor. We are the strength of the Empress, standing ever ready to crush the shadow that grows in Rokugan's
      midst. We do not know fear or doubt. Millions die if we are weak, but we will never falter. We are Crab.
    rarity: Fixed
    number: 518

  - title: The Crane Clan
    type: Other
    deck: Other
    text: We are the sons and daughters of Lady Doji. We remember all that is good and noble, even in the times of greatest
      darkness. Ours is the task of safe-guarding the courts of the Empress, reminding all what ideals should be sought with
      every fiber of their being. We are the arts, the customs, the perfect, shining strike of a flawless blade. We are Crane.
    rarity: Fixed
    number: 519

  - title: The Dragon Clan
    type: Other
    deck: Other
    text: We are the children of Togashi. We observe the Empire, studying its greatest successes and worst mistakes, seeking
      wisdom from both. We are the students, warriors, and brother monks of Rokugan, and we stand in defense of the honor of
      our Empress, who once bore our mon. We are Dragon.
    rarity: Fixed
    number: 520

  - title: The Imperial Assembly
    type: Other
    deck: Other
    text: The Imperial Assembly is your way to be a bigger part of your Clan and of L5R. Not only will you receive special promo
      cards and content, you also have the chance to take part in exclusive story line votes and other competitions. State your
      Clan loyalty today by joining your Clan in the Imperial Assembly!Visit www.L5R.com for all of the details.
    rarity: Fixed
    number: 521

  - title: The Imperial Favor
    type: Other
    deck: Other
    rarity: Fixed
    number: 522

  - title: The Lion Clan
    type: Other
    deck: Other
    text: We are the soldiers of Akodo, greatest general the mortal realm has ever known. Our duty is the defense of the Empire,
      the Empress, and all that is hers. We are the Right Hand of the Emperor, the greatest fighting force in the world. We
      are the might that exists when bushido and steel come together in the cause of honor. We are Lion.
    rarity: Fixed
    number: 523

  - title: The Mantis Clan
    type: Other
    deck: Other
    text: We are the scions of Yoritomo, the Son of Storms. We alone have the courage to face the fury of the seas and laugh.
      For one thousand years the Empire remained unchanged, until we had the courage to expand its borders and claim what was
      ours by right. We do not fear that which is different, for it makes us stronger, and we shall be the strongest of all
      clans. We are Mantis.
    rarity: Fixed
    number: 524

  - title: The Phoenix Clan
    type: Other
    deck: Other
    text: We are the children of Shiba and Isawa, a perfect partnership of mortal and immortal. We study all that is, that there
      might be no secrets that can threaten the Empire. We ensure that the Empire is at harmony with the realms of kami and
      spirits. When the time comes, if it must, we are the raw, elemental power that defends the Empire as well. We are Phoenix.
    rarity: Fixed
    number: 525

  - title: The Scorpion Clan
    type: Other
    deck: Other
    text: We are the shadows of Bayushi. We wait in the night, watching the weakness and hypocrisy of the other clans. We alone
      accept that terrible things must be done for the Empire to prosper, and we rejoice in the trust of the Empress that we
      shall see such things done. We are the knife in the dark, the villain that must exist to protect the Empress from threats
      she cannot see. We are Scorpion.
    rarity: Fixed
    number: 526

  - title: The Spider Clan
    type: Other
    deck: Other
    text: We are the sons of Daigotsu and Fu Leng, the dark ones who had the power to take that which they deemed theirs from
      the Celestial Heavens. We are the irresistible force that Rokugan changed to accommodate, for we could not be resisted.
      We embrace the power that the others fear. We are the evil that they accept, for to deny us is to be crushed before us.
      We are Spider.
    rarity: Fixed
    number: 527

  - title: The Unicorn Clan
    type: Other
    deck: Other
    text: We are the children of the Lady Shinjo, who swore she would return to us, and has again fulfilled her promise. We
      are the conscience of the Empire, the compassion that the other clans have forgotten. In the face of all difficulty, we
      remember the plight of the people, the importance of law, and the freedom of the spirit. But we are not weak, for our
      armies shake the land like thunder when the cause is just. We are Unicorn.
    rarity: Fixed
    number: 528

  - title: Togashi (Bio)
    type: Other
    deck: Other
    text: The wise and enigmatic Togashi stood apart from the Empire, watching it in secret for more than a thousand years in
      a number of guises as mortal Dragon Clan Champions. When the second Day of Thunder finally came, Togashi fought and died
      at the hands of his brother Fu Leng, but showed that Fu Leng was indeed mortal.
    rarity: Fixed
    number: 529

  - title: Togashi Hizumi (Bio)
    type: Other
    deck: Other
    text: Hizumi believes that his path to enlightenment lies in the exploration of the maximum destructive potential of a single
      human being. Invariably his tattoos allow him to devastate entire regions with their sheer power. Others are, understandably,
      reluctant to point out the oddity of his beliefs.
    rarity: Fixed
    number: 530

  - title: Togashi Korimi (Bio)
    type: Other
    deck: Other
    text: Korimi's eccentricities extend well beyond the normal oddities exhibited by other members of the Togashi order. Her
      tendency to forget to wear clothing in particular is remarkable even among her fellow monks, much less among the clans.
      Korimi simply finds such things unimportant.
    rarity: Fixed
    number: 531

  - title: Togashi Meiyu (Bio)
    type: Other
    deck: Other
    text: Despite her status as a monk, Meiyu's striking beauty has prompted several proposals from awestruck young samurai
      who have encountered her during their travels. Meiyu finds their interest bizarre, and declines politely. She has a greater
      duty to the Dragon Clan.
    rarity: Fixed
    number: 532

  - title: Togashi Torazu (Bio)
    type: Other
    deck: Other
    text: Torazu bears an affinity for fire unlike anything seen in a generation. All of his tattoos bear some semblance to
      fire, both in appearance and in effect. Some say he shares part of his spirit with the Fire Dragon in the same manner
      as an Oracle of Fire, but of course Oracles are restricted from violence.
    rarity: Fixed
    number: 533

  - title: Togashi Tsukagi (Bio)
    type: Other
    deck: Other
    text: Tsukagi is allegedly the son of Togashi Akagi, a brother well known for the darkness of his spirit as well as his
      eccentricity. Tsukagi has been granted a place among the order, and seeks to find his place among the clan as well. Mirumoto
      Shikei is said to have taken a personal interest in Tsukagi's exploits.
    rarity: Fixed
    number: 534

  - title: Tsuruchi Kosoko (Bio)
    type: Other
    deck: Other
    text: Kosoko was once asked to become a courtier for the Mantis, as her astounding beauty would have proved a great asset
      for her clan. She politely refused and followed her dream of becoming a skilled archer. She is a model of bushido to her
      brethren with her studiousness and morality.
    rarity: Fixed
    number: 535

  - title: Tsuruchi Tomaru (Bio)
    type: Other
    deck: Other
    text: Tomaru is not the brightest student to undergo gempukku in his year, but what he lacks in raw ability he makes up
      with tenacity. He does not give up once his mind is set and works harder to reach his goals. He maintains vigil in the
      Colonies for his clan.
    rarity: Fixed
    number: 536

  - title: Tsuruchi Yashiro (Bio)
    type: Other
    deck: Other
    text: Yashiro is a warrior scholar. He studies old texts describing battlefields long passed into history. He grudgingly
      admires the Scorpion Clan for their merciless tactics and the Lion Clan for their immaculate formations. Yashiro one day
      dreams of becoming a general and defeating the enemies he admires so much.
    rarity: Fixed
    number: 537

  - title: Void
    type: Other
    deck: Other
    text: Collect 3 Void cards and get a special Ring of the Void promotional card.Collect all 5 of these special Ring cards
      and get a unique promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 538

  - title: Water
    type: Other
    deck: Other
    text: Collect 3 Water cards and get a special Ring of Water promotional card.Collect all 5 of these special Ring cards and
      get a unique promotional card.Visit www.L5R.com for all of the details.
    rarity: Premium
    number: 539

  - title: Yoritomo (Bio)
    type: Other
    deck: Other
    text: The Son of Storms was not a true Kami, being born and living as a mortal. His boundless ambition led him to the Championship
      of an elevated Great Clan, and in the afterlife, the selfless Thunder Dragon sacrificed its divinity to elevate him to
      stand equal with the other Kami, granting the Mantis a voice in the Heavenly Court.
    rarity: Fixed
    number: 540

  - title: Yoritomo Hiromi (Bio)
    type: Other
    deck: Other
    text: Shortly before their father's retirement, Hiromi's elder twin sister informed him that she wished to forego the Championship
      in favor of a priestess' duties, and Hiromi has filled the post with admirable skill. He fights like a demon and is at
      home on the sea. Despite his amazing abilities, he occasionally doubts himself.
    rarity: Fixed
    number: 541

  - title: Yoritomo Naoto (Bio)
    type: Other
    deck: Other
    text: The Mantis Clan often dances with the letter of the law to maintain its economic and military advantages. Naoto is
      uncomfortable with the darker side of his clan. He follows orders, but he watches his actions warily to avoid degenerating
      into banditry.
    rarity: Fixed
    number: 542

  - title: Yoritomo Zinan (Bio)
    type: Other
    deck: Other
    text: Captain Zinan buys the first drink for his crewmen once they reach shore and he revels with them into the night. However,
      he rules with an iron hand once they set sail. He enjoys fighting with his fists and getting into the thick of combat.
    rarity: Fixed
    number: 543
