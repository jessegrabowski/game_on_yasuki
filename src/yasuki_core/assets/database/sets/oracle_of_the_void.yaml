    story: In Memory of Case Kiyonaga
    rarity: Promo
    artist: Jonathan Hill
    flavor: A rare sight in troubled times, it nonetheless enriches the lives of all whom it touches.
    pub: Mike Petke
    print_notes: Released - Gencon 2025 tournaments
    number: 1

