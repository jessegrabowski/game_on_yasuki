    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the turn ends, you have the trait, "When paying the cost of putting a card into play, once per game, produce 5 Gold which
      may only pay for that card."
    legality:
    - Clan Wars (Imperial)
    - Hidden Emperor (Jade)
    - Legacy
    rarity: Promo
    artist: Jonathan Hill
    flavor: In addition to their honor and teachings, sometimes the ancestors leave more practical gifts.
    pub: Mike Petke
    print_notes: Released - Gencon 2023 tournaments
    number: 2

  - title: The Egg of P'an Ku
    type: Strategy
    deck: Fate
    keywords:
    - Unique
    gold_cost: 9
    focus: 4
    text: 'Limited, : Target a Personality and put this Strategy into play in your home. After entering play and while it remains
      in play, it becomes a copy of the target''s printed card with all permanent effects that are currently affecting the target
      applied to it as well (the Personality''s costs need not be paid, play restrictions are not checked, and entering-play
      effects are not produced).'
    legality:
    - Clan Wars (Imperial)
    - Legacy
    - Rain of Blood (Diamond)
    card_notes: The Imperial Edition version was misprinted as an Item.
    rarity: Promo
    artist: Jonathan Hill
    pub: Mike Petke
    print_notes: Released - Gencon 2024 tournaments
    number: 3

