      your next turn begins, reduce the cost of all Followers in and out of play by 6, to a minimum of 1.
    legality:
    - Clan Wars (Imperial)
    - Legacy
    - Rain of Blood (Diamond)
    rarity: Uncommon
    artist: Ed Cox
    flavor: '"Like his sister, Toku''s eldest son Kyoji has sworn fealty to the Toturi name. He will be as great a hero as his
      father and sister one day, I think." - Saigorei'
    number: 1

  - title: Birth of the Anvil
    type: Event
    deck: Dynasty
    keywords:
