    - Legacy
    - Rain of Blood (Diamond)
    rarity: Rare
    artist: Beth Trott
    flavor: '"The histories of the Empire might remember Naseru as a villian. The Anvil was never concerned with such matters.
      The security of the Empire was always more important than being loved."'
    number: 2

