set: 'Siege: Clan War'
cards:
  - title: The Wasting Disease
    type: Clock
    deck: Other
    text: 1- Each Rokugani player may Cycle once more per game, even if it is not Turn 1.5- Rokugani players may refill their
      Provinces from their discard pile, face-down.9- Ignore Tiers 1 and 2. After revealing cards at the start of the turn,
      each Rokugani player discards all his or her face-up Personalities, refilling their Provinces face-up.
    rarity: Fixed
    artist: Gong Studios
    flavor: Yogo Junzo opened the first scroll, spreading a foul plague across the Empire. Thousands died, wiping out the Hantei
      heirs and sickening the Emperor himself. Thus the Clan War became inevitable.
    number: 1

  - title: Scorpion Clan Coup
    type: Territory
    deck: Other
    text: 'Rokugani players cannot control the Imperial Favor or take Favor actions.Favor Political Battle: Move home a target
      Personality.'
    rarity: Fixed
    artist: Gong Studios
    flavor: As his clan fell, Bayushi Shoju awaited his destiny, seated upon the Emerald Throne. No man could escape his fate.
      So how could an Empire?
    number: 1

  - title: The Iron Citadel
    type: Clock
    deck: Other
    text: 1- Once each, a number of Rokugani players equal to the number of opened Black Scrolls (including this one) may give
      their Stronghold +2GP before it bows.4- Rokugani players may each use their Strongholds' abilities an additional time
      per turn.9- All Rokugani Strongholds lose all text and their stats are set to 0.
    rarity: Fixed
    artist: Gong Studios
    flavor: Born of the second scroll's dark power, this fortress became the gathering place for Junzo's army, an unspeakable
      horde of walking dead, monstrous oni, and hopelessly Tainted mortals.
    number: 2

  - title: Beiden Pass
    type: Territory
    deck: Other
    text: '(Cannot be conquered.) The Yogo Junzo player has the following abilities which may be used c times per turn total
      (but still only once per turn each):Interrupt: Negate a Fear effect.Interrupt: Negate a Melee or Ranged Attack.Absent
      Interrupt: Negate an Engage action or one of the action''s movements.Absent Battle: Move your target Shadowlands Personality
      at any location home or to the current battlefield.Battle/Open: Straighten your target Shadowlands Personality.'
    rarity: Fixed
    artist: Gong Studios
    flavor: It was in Beiden Pass that the armies of Sukune and the disgraced Toturi encountered each other.
    number: 2

  - title: Black Wind from the Soul
    type: Clock
    deck: Other
    text: 1- Each Rokugani player refills their rightmost Province face-up, once per turn.4- Cards from their rightmost Provinces
      enter play for 2 less Gold.8- Ignore Tiers 1 and 2. Destroy each Rokugani player's rightmost Province.
    rarity: Fixed
    artist: Gong Studios
    flavor: The Phoenix opened four scrolls, seeking forbidden knowledge that might aid them against Fu Leng. Their souls were
      the price for their discovery. Isawa Tadaka was the first to pay, summoning an oni and torturing it with the power granted
      by the third scroll.
    number: 3

  - title: Isawa Palace
    type: Territory
    deck: Other
    text: '(Cannot be conquered.) The Yogo Junzo player has the ability, "Absent Unstoppable Battle, : For each Gold spent,
      give a non-Throne Room Territory a c Province Strength bonus or Fu Leng a c Force bonus, up to 5 Gold spent."'
    rarity: Fixed
    artist: Gong Studios
    flavor: To understand the threat to the Empire, the Phoenix sacrificed their very souls, unfurling black scrolls. Yet their
      good intentions could not spare them the dire consequences.
    number: 3

  - title: The Walking Horror of Fu Leng
    type: Clock
    deck: Other
    text: 1- Once each, a number of Rokugani players equal to the number of opened Black Scrolls (including this one) may Recruit
      their first Holding this turn for 2 less Gold.6- Each Rokugani player's first Recruited Holding enters play unbowed.8-
      Destroy Holdings before Rokugani players Recruit them. Their Holdings have -1GP.
    rarity: Fixed
    artist: Gong Studios
    flavor: Before the Clan War even began, the Fox lord Kitsune Gohei opened the fourth scroll in search of immortality. It
      did make him immortal, but the price was his humanity. His daughter Ryosei would hunt him for years, trying to purge the
      shame of his existence.
    number: 4

  - title: Dark Divination
    type: Clock
    deck: Other
    text: 1- Each Rokugani player draws a card.6- Each Rokugani player draws a card.9- Each Rokugani player discards four cards.
    rarity: Fixed
    artist: Gong Studios
    flavor: Isawa Uona, the Master of Air, opened the fifth scroll to learn what the future held. The scroll's Taint turned
      her face into an unmoving mask whose eyes wept tears of blood.
    number: 5

  - title: Otosan Uchi
    type: Territory
    deck: Other
    text: '(Cannot be conquered.) You may use abilities on this Territory c times total (usable only here).Repeatable Battle:
      Put a target attachment into its owner''s hand.Repeatable Interrupt: The action''s first Fear effect destroys Shadowlands
      cards it bows.Repeatable Unstoppable Battle: Fear 3.Repeatable Battle: Straighten your target Shadowlands Personality.'
    rarity: Fixed
    artist: Gong Studios
    flavor: A poisonous weed had grown in the heart of Rokugan. The time had come to cut it out.
    number: 5

  - title: Shapeshifting
    type: Clock
    deck: Other
    text: 1- The Rokugani players choose an opened Black Scroll; Shapeshifting copies its traits. (Resolve effects and add Corruption
      tokens based on the copied Black Scroll.)8- When Tier 1 is resolving, the Yogo Junzo player chooses the Scroll instead.
    rarity: Fixed
    artist: Gong Studios
    flavor: Isawa Tomo, the Master of Water, sought to master the potential of the sixth scroll. Its grotesque power was beyond
      his comprehension or control.
    number: 6

  - title: Throne Room
    type: Territory
    deck: Other
    province_strength: 0
    text: (Cannot be conquered.) Rokugani players ignore Honor Requirements. After a Black Scroll is opened, give all non-Shadowlands
      Personalities a number of Corruption tokens equal to the Threat Tier currently being resolved (1, 2, or 3). If a Personality
      ever has more Corruption tokens than printed Chi plus attachments, remove their Corruption tokens and give them Shadowlands
      until they leave play. After armies assign to attack the Throne Room, put the Throne Room Terrain into play and discard
      without effect all unopened Black Scrolls except The 12th Black Scroll. For each card this discarded, each Rokugani player
      draws a card. Then, open The 12th Black Scroll.
    rarity: Fixed
    artist: Gong Studios
    flavor: As thunder echoes through an endless valley, so too will the past become the present. Every man is but a bolt of
      lightning. Mortals can kill gods.
    number: 6

  - title: Touch of Despair
    type: Clock
    deck: Other
    text: 1- Rokugani players look at the top five cards of their Dynasty decks and put any of those cards at the bottom.5-
      Corruption tokens are not added.10- Ignore Tiers 1 and 2. c is increased by 1.
    rarity: Fixed
    artist: Gong Studios
    flavor: The spell Isawa had once devised to purge the Taint now bestowed it instead. Isawa Tsuke, proudest and most powerful
      of the Elemental Masters, was consumed by the seventh's scroll's madness.
    number: 7

  - title: Touch of Fu Leng
    type: Clock
    deck: Other
    text: 1- Each Rokugani player Recruits his or her first Personality each turn for 2 less Gold.5- After they enter play,
      the player may Equip an attachment to them for 4 less Gold.8- Destroy each Rokugani player's first Recruited Personality
      before entering play.
    rarity: Fixed
    artist: Gong Studios
    flavor: Kuni Yori used the eighth scroll to raise an army of undead for the Crab warrior Hida Amoro. The Kuni believed his
      knowledge of the Shadowlands would let him use the scroll safely. The Taint soon proved him wrong.
    number: 8

  - title: Return of the Fallen Lord
    type: Clock
    deck: Other
    text: '1- Rokugani players'' cards out of play have Kharmic. Their first Kharmic action costs .6- Rokugani players have,
      "Dynasty/Open, :g*:: Recruit a target card from your discard pile."10- Ignore Tiers 1 and 2. The Yogo Junzo player gains,
      "Open, :g*:: For each Rokugani player, you may target and Recruit a Personality from that player''s discard pile; the
      player pays the Gold costs."'
    rarity: Fixed
    artist: Gong Studios
    flavor: Driven by grief and rage, Soshi Bantaro used the ninth scroll to bring his lord, Bayushi Shoju, back from the dead.
      What arose was not Shoju, but an abomination that wore his rotting corpse like a garment.
    number: 9

  - title: A Terrible Oath
    type: Clock
    deck: Other
    text: 1- Rokugani players each give one of their Holdings +2GP.4- Rokugani Personalities have +1F/+1C.10- Ignore Tiers 1
      and 2. c is increased by 1.
    rarity: Fixed
    artist: Gong Studios
    flavor: Kuni Yori completed his betrayal by using the tenth scroll to sacrifice Hida Sukune, younger son of the Great Bear.
      The atrocity granted his soldiers great power, but the cost was irredeemable corruption.
    number: 10

  - title: Doom of Fu Leng
    type: Clock
    deck: Other
    text: 1- The Yogo Junzo player discards a card.6- The Yogo Junzo player discards a card.9- The Yogo Junzo player draws four
      cards.
    rarity: Fixed
    artist: Gong Studios
    flavor: Kuni Yori's servant Wazinu sought to use the eleventh scroll against the Chimes of Purity in Kyuden Seppun. The
      scheme failed, and Wazinu's scroll was cast into Jigoku.
    number: 11

  - title: The 12th Black Scroll
    type: Clock
    deck: Other
    text: 12- This can only be opened at the start of a turn or by the Throne Room. Its Threat is Tier 3. Fu Leng has been restored
      to his full power in the mortal realm. The Yogo Junzo player Recruits Fu Leng from outside the game, ignoring costs. After
      this turn ends, Yogo Junzo wins. 1,000 Years of Darkness have begun...
    rarity: Fixed
    artist: Gong Studios
    flavor: '"You see, now that your soul is fully released, it is also fully bonded into the body of the last Hantei. That''s
      right, Fu Leng… you are mortal." - The Hooded Ronin'
    number: 12

