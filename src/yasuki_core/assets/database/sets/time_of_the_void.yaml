  rarity: Uncommon
  artist: Bryon Wackwitz
  back_title: The First to Fall
  back_flavor: 'At the Imperial Palace, Shinjo Yokatsu arrived with his army of peasants and horsemen. Leading the
    charge was Otaku Kamoko and her battalion of battle maidens. When Junzo retreated from his doomed army, Kamoko
    charged after him. The undead shugenja turned back on the battle maiden, pulling black scrolls into his hands,
    summoning his dark lord''s power. With naught but a whisper from his mistress, Kamoko’s horse burst into a sudden
    blur of speed and Junzo’s body was crushed by her steed’s mighty strides.


    With Junzo broken under the hooves of the Unicorn, the undead army of the Emperor had no will to guide it. Together
    with the Crab and Lion armies, Kamoko destroyed the remainder of the porcelain-masked creatures while Yokatsu
    waited behind, blocking any possible reinforcements from coming to the doomed army’s aid. Then she watched as
    the Phoenix destroyed themselves and met Bayushi Kachiko at the gate.


    Finally, the Thunders were assembled. They entered the palace, and saw the death of Togashi Yokuni as Mirumoto
    Hitomi opened the last black scroll.


    Watching the power of the dark lord grow, Kamoko could stand by no longer. The descendant of Shinsei tried to
    hold her back, but she shrugged him off and charged at the Emperor, with her Clan’s sword in her hand and a
    wild battle cry in her heart …'
