  rarity: Uncommon
  artist: Douglas Shuler
  back_title: And so they fall...
  back_flavor: 'Fu Leng''s grip held fast about Kachiko''s throat. Doji Hoturi charged again, but the Dark Lord
    put his hand through the Crane''s chest and watched the Crane fall back, his eyes full of pain and surprise.


    Tadaka sent arrows of jade at the dark lord, who reflected them back at the Master of Earth, riddling his tainted
    body with purity.


    Toturi was next. The dark lord caught Toturi''s blade in his grip, and twisted it until Toturi lost his grip.
    Fu Leng smacked the ronin with the katana''s pommel sending him back into the darkness.


    Yakamo screamed out of the shadows of the throne room and ran forward, but Fu Leng changed the darkness about
    the hero into chains and bound Yakamo to the floor. At the door, Hitomi watched with the last black scroll and
    her obsidian hand ... and did nothing.


    "You have failed, Scorpion," Fu Leng whispered to Kachiko. "I will kill your comrades and keep you as a trophy."


    "Then take a good look at your trophy, dark one," she said. "For its the last look you''ll get."


    Only then did Fu Leng notice her black hair flowing freely over her shoulders. He looked down and saw the long
    needle hair pins in her hands ...'
