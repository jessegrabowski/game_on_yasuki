  artist: Tom Biondolillo
  back_title: The Last Master
  back_flavor: 'On the night before the assault on Otosan Uchi, Isawa Kaede, filled with visions of doom and dark
    prophesy, fled from the camp into the night. She spoke to Tadaka for only a moment, and she told him of her
    dreams and visions. “He is calling me,” she told him. When Tadaka asked her who was calling her, all Kaede could
    say was, “The Oracle. He calls me, Tadaka. He calls me.”


    On the walls of Otosan Uchi, the Master of Fire waited for his brothers and sisters. His mind finally eaten
    away by the corruption in his blood, he hurled black fire down upon his former Clan. The Elemental Masters,
    incomplete as they were, tried to stop his assault, but one by one they fell under the corrupt power of his
    fire. Only Isawa Tadaka had the strength to withstand the pain of his fire, and while the Master of Earth’s
    magic distracted his cousin, Shiba Ujimitsu was able to strike down the Fire Master.


    Tsuke’s blood was as black as midnight and burned Ujimitsu like flaming pitch. The Phoenix Champion screamed
    as he fell from the walls like a comet. He clung to life just long enough to whisper seven words to Shiba Tsukune,
    and put the Clan sword in her hands. Then he died. With a new-found fire in her eyes, she and Isawa Osugi lifted
    the bloody and burned Isawa Tadaka to his feet. They could only pray the Phoenix Thunder had the strength to
    hold on to life long enough to face the Dark Emperor within.'
