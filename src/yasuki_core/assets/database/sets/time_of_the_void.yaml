  artist: William O'Connor
  back_title: The Two Deaths of Yakamo
  back_flavor: 'When the armies of the Clans finally united under Yakamo and Toturi, the Crab Hero charged into
    the fray, his tetsubo and jade hand killing and crushing enemies as he went. Finally, his body bruised and bloodied,
    he saw the oni that stole his name. Yakamo kept his fury in check as he advanced on the creature, but when it
    turned to look at him with his own face and eyes, he could contain himself no longer.


    The duel was deadly and swift, and just when it seemed Yakamo had the upper hand, the oni''s acrid blood sprayed
    into his eyes, blinding the hero with pain. He stumbled backward, swinging his tetsubo blindly, hoping to keep
    the oni at bay until he could recover. He heard the oni cry out in pain ad when his vision cleared, he saw Mirumoto
    Hitomi crushing the oni''s head with her obsidian hand.


    Yakamo stood, his body aching with every movement. Hitomi waited. Yakamo shook his head, "I cannot afford the
    luxury of killing you."


    "I thought you were Kisada''s son," she whispered, her voice filled with hate. "I suppose he is the coward I
    always suspected him to be."


    Hitomi''s taunt was successful. Yakamo charged her, but the fresh Dragon was too quick for the wounded Crab.
    His tetsubo was on the ground and her blade was at his throat in a moment. "I won''t kill you now, but you''ll
    always remember that I could have."'
