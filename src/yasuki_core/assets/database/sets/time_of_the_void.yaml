  notes: Before Obsidian Edition, the stronghold cards weren't printed with the deck, but as promos and on the back
    of the starter deck boxes. They were also printed as fixed cards in Obsidian Edition with the Emerald Edition
    border.
  rarity: Uncommon
  artist: David Martin
  back_title: Hoturi's Last Request
  back_flavor: 'After their fateful duel with Fu Leng, Bayushi Kachiko knelt with the head of the dying Crane Champion
    on her lap. His blood flowed freely from his wound and his cough was wet and painful. With only moments of life
    left in his body, he whispered, "Take my hand." She did.


    "That was a foolish thing to do, Hoturi," she said to him. "After all the pain I''ve caused you. After everything
    I''ve taken from you. Your family, your clan..." her fingers touched the black braid tied to his belt. "...your
    wife."


    The strength in his fingers was fading. She held them tighter. "Why?" she asked, her whisper filled with confusion
    and rage. "You should have let me..."


    "Someone once told me life is too short for regrets." He coughed again. "And revenge." He struggled to see across
    the dim lit room. "I saw your courage, lady. It saved my best friend''s life." She put her fingers on his lips,
    but he shook his head. The pain in his chest stole more of his breath and she told him to rest. "No. I must
    say this." He looked deep in her eyes. "Take off your mask," he said. She did not protest. Hoturi smiled. "I
    forgive you," he whispered. "Pray, forgive me so I may pass in peace."


    With her mask set aside, she nodded. "I forgive you, Hoturi."


    He bit his blood-spangled lip and his eyes squeezed shut. Kachiko took the braid from his belt and slipped it
    into his hand. "I''m certain she forgives you, too."


    "Remember this day, lady," he said, his voice fading away. "Remember me."


    Just before the void came to claim him, Hoturi felt a single tear fall on his cheek and her voice softly whispering,
    "I will."'
