  rarity: Uncommon
  artist: Mike Kimble
  back_title: The Son of Storms
  back_flavor: 'The army of the Son of Storms returned to Otosan Uchi from its victory against Yogo Junzo''s reinforcements
    to find Junzo''s armies routed and crushed by the armies of the Thunders. Content with his victory, he approached
    Hoturi, Yakamo and Toturi with his lieutenants at his side. This time – unlike a thousand times before–Yoritomo
    did not kneel, only bowed.


    "We have routed the reinforcements," he told them. "And now my army stands ready."


    "Ready?" Toturi asked.


    "Yes. Ready to crush your own."


    Kakita Toshimoko, standing close to Doji Hoturi, put his hand on his blade, but his Champion shook his head.


    "Explain yourself, Stormson."


    Yoritomo removed his helmet. "My army is ready to attack. We will fail. Destiny cannot be denied. But we are
    ready to attack you now and die if it is necessary."


    "To what purpose?" Toturi asked.


    "To prove we are willing to die to prove we are worthy."


    Yoritomo''s eyes gave them no hint of feint or bluff. "I will send my lieutenants back and you will kill me
    here for my disobedience." He snapped his fingers and the two lieutenants retreated and he knelt with his head
    bowed.


    Hida Yakamo''s laughter could be heard across the battlefield. "By the Fortunes, I like this man!"


    Toturi nodded. "As do I. Call back your lieutenants, Son of Storms."


    "But you had better have your army pray," Hoturi told him. "If we fail, your new status will be short-lived."


    Yoritomo replaced his helmet. "Then don''t fail."'
