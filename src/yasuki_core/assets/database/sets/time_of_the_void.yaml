- title: The Ancestral Home of the Lion
  types:
  - Stronghold
  decks:
  - Pre-Game
  clans:
  - Lion
  text: <b>Battle/Open, :bow::</b> A target Lion Clan Personality has +2F while attacking.
  province_strength: 7
  starting_honor: 6
  legality:
  - Age of Enlightenment (Lotus)
  - Clan Wars (Imperial)
  - Hidden Emperor (Jade)
  - Legacy
  notes: Before Obsidian Edition, the stronghold cards weren't printed with the deck, but as promos and on the back
    of the starter deck boxes. They were also printed as fixed cards in Obsidian Edition with the Emerald Edition
    border.
  rarity: Uncommon
  artist: Nicola Leonard
  back_title: Tsuko and Rokugan
  back_flavor: 'When Toturi''s army approached Otosan Uchi, two Lion armies were there. One, led by Ikoma Tsanuri,
    carried the banner of the Emperor, ready to fulfill their oaths to protect the Emperor at all costs. The other,
    led by Kitsu Motso, carried the banner of the Lion, ready to kill or die for the empire.


    As he watched, the armies charged at each other with a thunderous cry. Discipline quickly descended into disorder.
    and Lion fought Lion, regardless of family or allegiance.


    No longer able to stomach the bloodshed between the members of his former clan, Toturi charged his army into
    the midst of the battle as Junzo''s army simply watched and laughed. Toturi''s battle cry erupted from the middle
    of the fighting and a deep silence fell across the battlefield.


    About to engage each other, Tsanuri and Motso both turned to look at Toturi, and the thousands of bloody Lions
    waited for a command – any command. Toturi raised his sword high and pointed it at Junzo.


    "For Matsu Tsuko, and for Rokugan!"


    Behind the the feral smiles of their three commanders, a single army turned towards the army of Yogo Junzo and
    the battle cry of ten thousand Lions, old and new, echoed through the walls of Otosan Uchi.'
- title: The Brotherhood of Shinsei
  types:
  - Stronghold
  decks:
  - Pre-Game
  clans:
  - Brotherhood of Shinsei
  text: <b>Repeatable Reaction, :bow::</b> Before you would trigger a Ring's printed trait that would put it into
    play, or if you ever meet the conditions for a Ring's printed action which would put it into play, search your
    Fate deck for that Ring, show it, and put it into your hand. <i>(If Reacting to meeting a trait's trigger, you
    then have a chance to trigger that trait after taking this action.)</i>
  province_strength: 6
  starting_honor: 4
  legality:
  - Clan Wars (Imperial)
  - Hidden Emperor (Jade)
  - Legacy
  notes: Before Obsidian Edition, the stronghold cards weren't printed with the deck, but as promos and on the back
    of the starter deck boxes.
  rarity: Uncommon
  artist: Ellym Sirac
  back_title: The 12th Scroll is Opened
  back_flavor: 'When Togashi’s heart was nothing but a dried husk, Hitomi cast it aside and broke the seal on the
    last black scroll, releasing the last remainder of Fu Leng’s soul. His triumphant laughter filled the room and
    he called out to the Thunders.


    "Do what you will! My power is now complete! A thousand years ago, your descendants died to trap me in those
    scrolls. Look at you now. Look at me! My power is a thousand times greater than what it was. My victory is complete!"


    But from the shadows, a different laughter was heard. Its owner stepped from the darkness, clapping his hands
    and nodding his hooded head. "You are right, dark one. Your power is greater than ever before. But there is
    one thing you did not count on. One thing that I have known, and my father, and his father, and even the first
    Shinsei you killed a thousand years ago. You see, now that your soul is fully released, it is also fully bonded
    into the body of the last Hantei."


    As Fu Leng realized what Shinsei said, his eyes began to dim with the darkness of fear.


    "That’s right, Fu Leng," Shinsei said, his face twisting into a smile.

    "You are mortal."'
