  artist: Daren Bader
  back_title: Kachiko's Bluff
  back_flavor: 'Shadows moved along the hallways of the Imperial Palace preparing for the arrival of the army of
    the Seven Thunders. The Emperor stormed about the palace as all of his own preparations met with failure. Everywhere
    he turned, his guards were dead or missing. The gates were open and drawbridges dropped. He threw open a panel
    and found his wife and seized her by her kimono, lifting her high in the air. "You! You are the cause of all
    of this! I will kill you!"


    She smiled. "You cannot. Only when the Thunders are assembled can you kill us. Every creature in the world has
    rules it must follow and you are no exception." She looked the Emperor, her gaze turning poison. "Killing me
    now violates laws that are greater than even your power."


    The Emperor''s fists clenched, his eyes burst with black fire and his voice rattled the foundations of the palace.
    He threw her to the floor and stormed away. Kachiko was still for a moment, then her body began to shudder from
    the strain of hiding her fear. "You were right about that, Yokuni," she whispered. "I pray you are wrong about
    the rest."'
