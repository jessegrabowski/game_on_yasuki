  rarity: Uncommon
  artist: Tom Biondolillo
  back_title: Hitomi's Last Test
  back_flavor: 'As the Thunders prepared to enter the Throne Room, Togashi Yokuni stepped before them. "You all
    know your destiny. Deny it at your own risk." Then he turned to Hitomi. "Yours is the darkest path. Walk it
    with care. More rests on your shoulders than you know."


    Then, he turned and entered the Throne Room, removing his helmet and his armor. "I am here, Fu Leng!" he cried
    out and the Thunders winced from hearing the name spoken. "I am here to show them that you can bleed!"


    Suddenly, the Dragon Champion transformed before their eyes. His skin turned to scales and his legs and arms
    grew long as his body twisted and shifted until his true form was revealed to all.


    "It is me!" he cried out. "It is your brother Togashi! Face me now if you dare!"


    Another dragon appeared, this one made of smoke and shadow. The battle of the two brothers was swift and certain.
    Togashi''s teeth drew blood from Fu Leng, but the dark one twisted his brother''s body in his arms, snapping
    his back. Then, he threw the broken dragon at the feet of the Thunders and laughed.


    Hitomi knelt down before Togashi, her obsidian hand glowing with a hungry light. She plunged it into the dragon''s
    chest and pulled out both his heart and the lost twelfth black scroll. Then, she squeezed his still-beating
    heart, stealing his strength, making it her own.'
