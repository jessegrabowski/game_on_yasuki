  back_title: The Thunders Attack
  back_flavor: 'In the darkness of the Throne room, Toturi watched Kamoko charge Fu Leng and could do nothing as
    Fu Leng swat her aside like an inconsequential insect. The jade fire that erupted beside him came from Yakamo’s
    hand and the eyes of the wounded Master of Earth.


    Yakamo charged Fu Leng, with Tadaki’s magic shrouding him in holy light. Black fire blasted from the Dark Lord’s
    palms, but Tadaki’s jade aura protected the Crab Thunder as Yakamo’s father’s sword drew black, corrupt blood.


    Doji Hoturi was just behind Yakamo, his own Clan sword held high over his head. Both Thunders sliced at Fu Leng’s
    mortal body again before the dark lord expelled them from his presence with an unholy wind. Toturi looked about
    quickly, then turned to Tadaki. “The Throne, Tadaki! The Emerald Throne!” The Master of Earth nodded and with
    his chants the chair rose high into the air. Before Fu Leng could move, Tadaki dropped the Emperor’s Throne
    on the dark lord.


    Toturi charged the Emperor then, raising his sword, but Fu Leng recovered too quickly. He grabbed Toturi’s throat
    with his death-cold grip and smiled through bloody teeth. “Now you are mine, Lion!” Toturi felt the inhuman
    grip squeeze … then release. He opened his eyes to see Kachiko ripping at the dark lord’s eyes. He was dropped
    to the floor as black blood poured out of the Dark One’s wounds, but his fist clenched about Kachiko’s slender
    throat …'
