set: Web of Lies
cards:
  - title: Shattered Focus
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, it enters
      play in your home.All players must focus at least once during a duel involving one of their Personalities, if able.Reaction:
      After focus cards are revealed in a duel, discard this Event from play to discard one of each player''s focused cards.'
    legality:
    - Age of Enlightenment (Lotus)
    - Legacy
    - Rain of Blood (Diamond)
    rarity: Rare
    artist: Malcolm McClinton
    flavor: '"After all that has happened, I still wonder which side the Scorpion take in this war," Korin said. "Is it not
      obvious?" Sume laughed. "Their own."'
    number: 1

  - title: I Am Ready
    type: Event
    deck: Dynasty
    keywords:
