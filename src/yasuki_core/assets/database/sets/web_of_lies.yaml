    text: 'After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, until
      the game ends, you have the ability, "Battle: Once per battle, target your performing Personality with an attachment to
      bow a target enemy Personality without attachments."'
    legality:
    - Age of Enlightenment (Lotus)
    - Destroyer War (Celestial)
    - Legacy
    - Modern
    - Race for the Throne (Samurai)
    - Rain of Blood (Diamond)
    rarity: Rare
    artist: Christopher Appel
    flavor: Some among the Mantis will not rest until Aramasu is avenged.
    number: 3

  - title: The Last Prophecy
    type: Event
    deck: Dynasty
    keywords:
    - Unique
    text: After you reveal cards in your Provinces at the start of your turn, if this Event is face-up in one of them, name
      a card. Search your Fate deck for that card, show it, and put it in your hand. Discard a number of cards equal to its
      Focus Value or your entire hand, whichever amount of cards is lower.
