services:
  db:
    image: postgres:16-alpine
    container_name: l5r-db
    environment:
      - POSTGRES_USER=l5r
      - POSTGRES_PASSWORD=l5r
      - POSTGRES_DB=l5r
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U l5r -d l5r"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    build: .
    image: l5r-app:latest
    container_name: l5r-db-init
    environment:
      - L5R_DATABASE_URL=postgresql://l5r:l5r@db:5432/l5r
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pixi run -e prod python -c "
        import psycopg2, os, sys
        conn = psycopg2.connect(os.environ['L5R_DATABASE_URL'])
        cur = conn.cursor()
        cur.execute(\"SELECT 1 FROM information_schema.tables WHERE table_name = 'cards'\")
        if cur.fetchone():
            cur.execute('SELECT COUNT(*) FROM cards')
            if cur.fetchone()[0] > 0:
                print('Database already seeded, nothing to do')
                sys.exit(0)
        sys.exit(1)
        " || pixi run -e prod install-db --dsn "$$L5R_DATABASE_URL"
    restart: "no"

  api:
    build: .
    image: l5r-app:latest
    container_name: l5r-api
    environment:
      - L5R_DATABASE_URL=postgresql://l5r:l5r@db:5432/l5r
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: ["pixi", "run", "-e", "prod", "api"]
    profiles:
      - api

volumes:
  postgres_data:
