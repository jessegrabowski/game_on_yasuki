services:
  db:
    image: postgres:16-alpine
    container_name: l5r-db
    environment:
      - POSTGRES_USER=l5r
      - POSTGRES_PASSWORD=l5r
      - POSTGRES_DB=l5r
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U l5r -d l5r"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    build: .
    container_name: l5r-db-init
    environment:
      - L5R_DATABASE_URL=postgresql://l5r:l5r@db:5432/l5r
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["pixi", "run", "install-db", "--dsn"]
    command: ["postgresql://l5r:l5r@db:5432/l5r"]
    restart: "no"

  api:
    build: .
    container_name: l5r-api
    environment:
      - L5R_DATABASE_URL=postgresql://l5r:l5r@db:5432/l5r
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["pixi", "run", "api"]
    profiles:
      - api

volumes:
  postgres_data:
