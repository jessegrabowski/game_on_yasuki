services:
  db:
    image: postgres:16-alpine
    container_name: yasuki-db
    command: ["postgres", "-c", "statement_timeout=30000"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-yasuki}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yasuki}
      - POSTGRES_DB=${POSTGRES_DB:-yasuki}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yasuki} -d ${POSTGRES_DB:-yasuki}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    build: .
    image: yasuki-app:latest
    container_name: yasuki-db-init
    environment:
      - YASUKI_DATABASE_URL=postgresql://${POSTGRES_USER:-yasuki}:${POSTGRES_PASSWORD:-yasuki}@db:5432/${POSTGRES_DB:-yasuki}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pixi run -e prod python -c "
        import psycopg, sys
        from yasuki_core.database import get_connection_string
        dsn = get_connection_string()
        conn = psycopg.connect(dsn)
        cur = conn.cursor()
        cur.execute(\"SELECT 1 FROM information_schema.tables WHERE table_name = 'cards'\")
        if cur.fetchone():
            cur.execute('SELECT COUNT(*) FROM cards')
            if cur.fetchone()[0] > 0:
                print('Database already seeded, nothing to do')
                sys.exit(0)
        sys.exit(1)
        " || pixi run -e prod install-db
    restart: "no"

  api:
    build: .
    image: yasuki-app:latest
    container_name: yasuki-api
    environment:
      - YASUKI_DATABASE_URL=postgresql://${POSTGRES_USER:-yasuki}:${POSTGRES_PASSWORD:-yasuki}@db:5432/${POSTGRES_DB:-yasuki}
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-/images}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: ["pixi", "run", "-e", "prod", "api"]
    profiles:
      - api

volumes:
  postgres_data:
