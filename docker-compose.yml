services:
  app:
    build: .
    image: game-on-yasuki:latest
    platform: linux/amd64
    container_name: game-on-yasuki
    environment:
      - L5R_DATABASE_URL=postgresql://l5r:l5r@db/l5r
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["pixi", "run", "play"]

  db:
    image: postgres:16-alpine
    container_name: game-on-yasuki-db
    environment:
      - POSTGRES_USER=l5r
      - POSTGRES_PASSWORD=l5r
      - POSTGRES_DB=l5r
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U l5r -d l5r"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: game-on-yasuki:latest
    container_name: game-on-yasuki-api
    environment:
      - L5R_DATABASE_URL=postgresql://l5r:l5r@db/l5r
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["pixi", "run", "api"]
    profiles:
      - api

volumes:
  postgres_data:
