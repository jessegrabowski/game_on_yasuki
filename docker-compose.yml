services:
  db:
    image: postgres:16-alpine
    container_name: yasuki-db
    command: ["postgres", "-c", "statement_timeout=30000"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-yasuki}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      - POSTGRES_DB=${POSTGRES_DB:-yasuki}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bound to loopback only: local tooling can reach the DB, but it is not exposed on the host's
      # external interfaces. Remove this mapping entirely in production (the app uses the @db network).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yasuki} -d ${POSTGRES_DB:-yasuki}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    build: .
    image: yasuki-app:latest
    container_name: yasuki-db-init
    environment:
      # Connects as the owner role to create the schema and seed data.
      - YASUKI_DATABASE_URL=postgresql://${POSTGRES_USER:-yasuki}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}@db:5432/${POSTGRES_DB:-yasuki}
      # Optional least-privilege read-only role. Leave POSTGRES_RO_PASSWORD empty to skip; set it to
      # have db-init provision a SELECT-only role the API can use (see the api service below).
      - POSTGRES_RO_USER=${POSTGRES_RO_USER:-yasuki_ro}
      - POSTGRES_RO_PASSWORD=${POSTGRES_RO_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pixi run -e prod python -c "
        import psycopg, sys
        from yasuki_core.database import get_connection_string
        dsn = get_connection_string()
        conn = psycopg.connect(dsn)
        cur = conn.cursor()
        cur.execute(\"SELECT 1 FROM information_schema.tables WHERE table_name = 'cards'\")
        if cur.fetchone():
            cur.execute('SELECT COUNT(*) FROM cards')
            if cur.fetchone()[0] > 0:
                print('Database already seeded, nothing to do')
                sys.exit(0)
        sys.exit(1)
        " || pixi run -e prod install-db && pixi run -e prod ensure-ro-role
    restart: "no"

  api:
    build: .
    image: yasuki-app:latest
    container_name: yasuki-api
    environment:
      # Owner DSN by default. For least privilege, set POSTGRES_RO_PASSWORD (so db-init provisions the
      # read-only role) and swap the line below for the commented read-only DSN.
      - YASUKI_DATABASE_URL=postgresql://${POSTGRES_USER:-yasuki}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}@db:5432/${POSTGRES_DB:-yasuki}
      # - YASUKI_DATABASE_URL=postgresql://${POSTGRES_RO_USER:-yasuki_ro}:${POSTGRES_RO_PASSWORD}@db:5432/${POSTGRES_DB:-yasuki}
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-/images}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: ["pixi", "run", "-e", "prod", "api"]
    profiles:
      - api

volumes:
  postgres_data:
