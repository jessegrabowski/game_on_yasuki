name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  check-lockfile:
    name: "Check lockfile"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.63.2
          run-install: false

      - name: Check lockfile is up to date
        run: |
          pixi install --locked
          if ! git diff --exit-code pixi.lock; then
            echo "::error::pixi.lock is out of date. Run 'pixi install' locally and commit the updated lockfile."
            exit 1
          fi

  pre-commit:
    name: "Pre-commit"
    needs: [check-lockfile]
    runs-on: ubuntu-latest
    env:
      SKIP: no-commit-to-branch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        include:
          - subset-name: "Core Tests"
            os: ubuntu-latest
            python-version: "3.12"
            test-subset: "tests/yasuki_core/"

          - subset-name: "GUI Tests"
            os: ubuntu-latest
            python-version: "3.12"
            test-subset: "tests/yasuki_gui/"

    name: ${{ matrix.subset-name }} (${{ matrix.os }} Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    env:
      TEST_SUBSET: ${{ matrix.test-subset }}

    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install xvfb for GUI tests
        if: contains(matrix.test-subset, 'gui')
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.63.2
          cache: true

      - name: Show Python version
        run: pixi run python --version

      - name: Create matrix id
        id: matrix-id
        env:
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
        run: |
          echo $MATRIX_CONTEXT
          export MATRIX_ID=`echo $MATRIX_CONTEXT | sha256sum | cut -c 1-32`
          echo $MATRIX_ID
          echo "id=$MATRIX_ID" >> $GITHUB_OUTPUT

      - name: Start xvfb
        if: contains(matrix.test-subset, 'gui')
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1

      - name: Run tests
        run: |
          pixi run pytest -vv --cache-clear --cov=yasuki_core --cov=yasuki_web --cov=yasuki_gui --cov-report=xml:coverage/coverage-${MATRIX_ID}.xml --no-cov-on-fail --cov-report term $TEST_SUBSET --durations=50
        env:
          MATRIX_ID: ${{ steps.matrix-id.outputs.id }}
          DISPLAY: ":99"

      - name: Upload coverage file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ steps.matrix-id.outputs.id }}
          path: coverage/coverage-${{ steps.matrix-id.outputs.id }}.xml

  js-test:
    name: "Deck Builder JS Tests"
    needs: [pre-commit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Run JS tests
        run: node --test tests/yasuki_web/deck_builder/*.test.js

  all-checks:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: "All tests"
    needs: [test, js-test]
    steps:
      - name: Check build matrix status
        if: ${{ needs.test.result != 'success' || needs.js-test.result != 'success' }}
        run: exit 1

  upload-coverage:
    runs-on: ubuntu-latest
    name: "Upload coverage"
    needs: [all-checks, docker-test]
    # docker-test contributes the yasuki_web coverage; it is skipped on non-PR feature-branch pushes,
    # so tolerate that (skipped != failure) rather than block the upload.
    if: ${{ always() && needs.all-checks.result == 'success' && needs.docker-test.result != 'failure' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install -U coverage>=5.1 coveralls

      - name: Download coverage file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jessegrabowski/game_on_yasuki

  docker:
    name: "Docker build"
    needs: [all-checks]
    if: ${{ needs.all-checks.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Get version from git
        id: version
        run: |
          if git describe --tags --match 'v*' > /dev/null 2>&1; then
            VERSION=$(git describe --tags --match 'v*' --dirty | sed 's/^v//')
          else
            VERSION="0.0.0+g$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-test:
    name: "Docker integration test"
    needs: [all-checks]
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yasuki
          POSTGRES_PASSWORD: yasuki
          POSTGRES_DB: yasuki
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.63.2
          cache: true

      - name: Initialize database
        env:
          YASUKI_DATABASE_URL: postgresql://yasuki:yasuki@localhost:5432/yasuki
        run: pixi run install-db

      - name: Run tests
        env:
          YASUKI_DATABASE_URL: postgresql://yasuki:yasuki@localhost:5432/yasuki
        run: |
          pixi run pytest tests/ --ignore=tests/yasuki_gui/ \
            --cov=yasuki_core --cov=yasuki_web \
            --cov-report=xml:coverage/coverage-web.xml --no-cov-on-fail

      - name: Upload coverage file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-web
          path: coverage/coverage-web.xml
