name: Validate Pixi Lockfile

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-lockfile:
    name: "Check lockfile is up to date"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          run-install: false

      - name: Check lockfile is up to date
        run: |
          pixi install --locked
          if ! git diff --exit-code pixi.lock; then
            echo "::error::pixi.lock is out of date. Run 'pixi install' locally and commit the updated lockfile."
            exit 1
          fi
