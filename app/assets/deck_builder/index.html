<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Builder — Game on, Yasuki!</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text-dim: #999;
    --border: #333;
    --card-w: 250px;
    --card-h: 350px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }
  header {
    background: var(--surface);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header .counts { font-size: 0.85rem; color: var(--text-dim); }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr 320px;
    height: calc(100vh - 44px);
    gap: 1px;
    background: var(--border);
  }
  .col {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-header {
    background: var(--surface);
    padding: 8px 12px;
    font-weight: 600;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Search & Filters */
  .filters {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .filters input, .filters select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 0.85rem;
  }
  .filter-row {
    display: flex;
    gap: 6px;
  }
  .filter-row select { flex: 1; }

  /* Card List */
  .card-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .card-list-item {
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 0.85rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-list-item:hover { background: var(--surface); }
  .card-list-item.selected { background: var(--surface2); }
  .card-list-item .side-tag {
    font-size: 0.7rem;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .side-tag.dynasty { background: #553311; color: #ffcc66; }
  .side-tag.fate { background: #113355; color: #66ccff; }
  .side-tag.pre_game { background: #335533; color: #88dd88; }
  .load-more {
    text-align: center;
    padding: 8px;
  }
  .load-more button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .load-more button:hover { background: var(--accent); }

  /* Deck panel */
  .deck-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .deck-section-header {
    padding: 6px 12px;
    font-weight: 600;
    font-size: 0.85rem;
    background: var(--surface);
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .deck-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .deck-item {
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 0.83rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .deck-item:hover { background: var(--surface); }
  .deck-item.selected { background: var(--surface2); }
  .deck-item .qty {
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 0.75rem;
    min-width: 20px;
    text-align: center;
  }
  .deck-actions {
    padding: 6px 8px;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }
  .btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 0.8rem;
    flex: 1;
  }
  .btn:hover { background: var(--accent); }
  .btn-danger { border-color: #662222; }
  .btn-danger:hover { background: #cc3333; }

  /* Preview */
  .preview {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .preview-img {
    width: var(--card-w);
    height: var(--card-h);
    object-fit: contain;
    border-radius: 6px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .preview-placeholder {
    width: var(--card-w);
    height: var(--card-h);
    background: var(--surface);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 0.9rem;
    flex-shrink: 0;
  }
  .preview-stats {
    width: 100%;
    font-size: 0.85rem;
  }
  .preview-stats table {
    width: 100%;
    border-collapse: collapse;
  }
  .preview-stats td {
    padding: 3px 6px;
    border-bottom: 1px solid var(--border);
  }
  .preview-stats td:first-child {
    color: var(--text-dim);
    width: 40%;
  }
  .preview-name {
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    width: 100%;
  }
  .preview-rules {
    width: 100%;
    font-size: 0.83rem;
    line-height: 1.5;
    background: var(--surface);
    padding: 10px;
    border-radius: 6px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .empty-state {
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <h1>⛩️ Deck Builder — Game on, Yasuki!</h1>
  <div class="counts">
    <span id="totalCards">0 cards</span> in database
  </div>
</header>

<div class="columns">
  <!-- Left: Card Search -->
  <div class="col">
    <div class="col-header">Card Search</div>
    <div class="filters">
      <input type="text" id="searchInput" placeholder="Search cards by name or text…">
      <div class="filter-row">
        <select id="deckFilter"><option value="">All Decks</option></select>
        <select id="clanFilter"><option value="">All Clans</option></select>
        <select id="typeFilter"><option value="">All Types</option></select>
      </div>
    </div>
    <div class="card-list" id="cardList"></div>
    <div class="load-more" id="loadMore" style="display:none">
      <button onclick="loadMore()">Load More…</button>
    </div>
  </div>

  <!-- Middle: Deck Composition -->
  <div class="col">
    <div class="col-header">Deck Composition</div>
    <div class="deck-section">
      <div class="deck-section-header">
        <span>Dynasty Deck</span>
        <span id="dynastyCount">0</span>
      </div>
      <div class="deck-list" id="dynastyList"></div>
    </div>
    <div class="deck-section">
      <div class="deck-section-header">
        <span>Fate Deck</span>
        <span id="fateCount">0</span>
      </div>
      <div class="deck-list" id="fateList"></div>
    </div>
    <div class="deck-actions">
      <button class="btn" onclick="addSelectedToDeck()">Add to Deck</button>
      <button class="btn" onclick="removeSelectedFromDeck()">Remove</button>
      <button class="btn btn-danger" onclick="clearDeck()">Clear Deck</button>
    </div>
  </div>

  <!-- Right: Card Preview -->
  <div class="col">
    <div class="col-header">Card Preview</div>
    <div class="preview" id="preview">
      <div class="preview-placeholder">Select a card to preview</div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let IMG = '/images';

let allResults = [];
let offset = 0;
const LIMIT = 100;
let selectedCard = null;
let selectedDeckCard = null;

const deck = { DYNASTY: {}, FATE: {}, PRE_GAME: {} };

const $ = id => document.getElementById(id);

// ── Bootstrap ──────────────────────────────────────────────────────
async function init() {
  try {
    const cfg = await fetchJSON(`${API}/config`);
    IMG = cfg.image_base_url || IMG;
  } catch (e) { /* fall back to /images for local dev */ }

  const [decks, clans, types] = await Promise.all([
    fetchJSON(`${API}/decks`),
    fetchJSON(`${API}/clans`),
    fetchJSON(`${API}/card-types`),
  ]);

  populateSelect('deckFilter', decks.deck_types || []);
  populateSelect('clanFilter', clans.clans || []);
  populateSelect('typeFilter', types.card_types || []);

  $('searchInput').addEventListener('input', debounce(searchCards, 200));
  $('deckFilter').addEventListener('change', searchCards);
  $('clanFilter').addEventListener('change', searchCards);
  $('typeFilter').addEventListener('change', searchCards);

  searchCards();
}

function populateSelect(id, items) {
  const el = $(id);
  const first = el.options[0];
  el.innerHTML = '';
  el.appendChild(first);
  items.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item;
    opt.textContent = item;
    el.appendChild(opt);
  });
}

// ── API helpers ────────────────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

// ── Search ─────────────────────────────────────────────────────────
async function searchCards() {
  offset = 0;
  allResults = [];
  await fetchCards();
}

async function fetchCards() {
  const params = new URLSearchParams();
  const search = $('searchInput').value.trim();
  const deck = $('deckFilter').value;
  const clan = $('clanFilter').value;
  const type = $('typeFilter').value;

  if (search) params.set('search', search);
  if (deck) params.set('deck', deck);
  if (clan) params.set('clan', clan);
  if (type) params.set('card_type', type);
  params.set('limit', LIMIT);
  params.set('offset', offset);

  try {
    const data = await fetchJSON(`${API}/cards?${params}`);
    if (offset === 0) allResults = [];
    allResults.push(...data.cards);
    $('totalCards').textContent = `${data.total} cards`;
    renderCardList();
    $('loadMore').style.display = data.has_more ? '' : 'none';
  } catch (e) {
    console.error('Failed to fetch cards:', e);
  }
}

function loadMore() {
  offset += LIMIT;
  fetchCards();
}

// ── Card List Rendering ────────────────────────────────────────────
function renderCardList() {
  const el = $('cardList');
  el.innerHTML = '';
  allResults.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card-list-item' + (selectedCard?.id === card.id ? ' selected' : '');
    div.innerHTML = `
      <span>${esc(card.name)}${card.is_unique ? ' ◆' : ''}</span>
      <span class="side-tag ${(card.side||'').toLowerCase()}">${card.side || '?'}</span>
    `;
    div.addEventListener('click', () => selectCard(card));
    div.addEventListener('dblclick', () => { selectCard(card); addSelectedToDeck(); });
    el.appendChild(div);
  });
}

function selectCard(card) {
  selectedCard = card;
  selectedDeckCard = null;
  renderCardList();
  renderDeckLists();
  showPreview(card);
}

// ── Card Preview ───────────────────────────────────────────────────
async function showPreview(card) {
  const el = $('preview');

  let prints = [];
  try {
    const detail = await fetchJSON(`${API}/cards/${card.id}`);
    prints = detail.prints || [];
  } catch (e) { /* ignore */ }

  const imgPath = card.image_path || (prints[0]?.image_path);
  const imgSrc = imgPath ? `${IMG}/${imgPath}` : null;

  const stats = [
    ['Type', card.type],
    ['Clan', card.clan],
    ['Deck', card.side],
    ['Force', card.force],
    ['Chi', card.chi],
    ['Gold Cost', card.gold_cost],
    ['Honor Req', card.honor_requirement],
    ['Personal Honor', card.personal_honor],
    ['Province Str', card.province_strength],
    ['Gold Prod', card.gold_production],
    ['Starting Honor', card.starting_honor],
    ['Focus', card.focus],
  ].filter(([, v]) => v != null && v !== '');

  el.innerHTML = `
    ${imgSrc
      ? `<img class="preview-img" src="${esc(imgSrc)}" alt="${esc(card.name)}" onerror="this.style.display='none'">`
      : `<div class="preview-placeholder">No image available</div>`}
    <div class="preview-name">${esc(card.name)}${card.is_unique ? ' ◆' : ''}${card.extended_title ? `<br><span style="font-size:0.8rem;font-weight:400;color:var(--text-dim)">${esc(card.extended_title)}</span>` : ''}</div>
    <div class="preview-stats">
      <table>${stats.map(([k, v]) => `<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`).join('')}</table>
    </div>
    ${card.text ? `<div class="preview-rules">${esc(card.text)}</div>` : ''}
    ${prints.length > 1 ? `<div style="font-size:0.8rem;color:var(--text-dim)">${prints.length} printings: ${prints.map(p => esc(p.set_name)).join(', ')}</div>` : ''}
  `;
}

// ── Deck Management ────────────────────────────────────────────────
function addSelectedToDeck() {
  if (!selectedCard) return;
  const side = selectedCard.side || 'FATE';
  const bucket = deck[side] || deck.FATE;
  const id = selectedCard.id;
  if (!bucket[id]) bucket[id] = { card: selectedCard, qty: 0 };
  bucket[id].qty++;
  renderDeckLists();
}

function removeSelectedFromDeck() {
  if (!selectedDeckCard) return;
  const { side, id } = selectedDeckCard;
  const bucket = deck[side];
  if (!bucket?.[id]) return;
  bucket[id].qty--;
  if (bucket[id].qty <= 0) delete bucket[id];
  selectedDeckCard = null;
  renderDeckLists();
}

function clearDeck() {
  Object.keys(deck).forEach(k => deck[k] = {});
  selectedDeckCard = null;
  renderDeckLists();
}

function renderDeckLists() {
  renderDeckSide('DYNASTY', 'dynastyList', 'dynastyCount');
  renderDeckSide('FATE', 'fateList', 'fateCount');
}

function renderDeckSide(side, listId, countId) {
  const el = $(listId);
  const bucket = deck[side] || {};
  const entries = Object.entries(bucket).sort(([, a], [, b]) => a.card.name.localeCompare(b.card.name));
  const total = entries.reduce((s, [, e]) => s + e.qty, 0);
  $(countId).textContent = total;

  el.innerHTML = '';
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty-state">No cards added yet</div>';
    return;
  }
  entries.forEach(([id, entry]) => {
    const div = document.createElement('div');
    const isSelected = selectedDeckCard?.side === side && selectedDeckCard?.id === id;
    div.className = 'deck-item' + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <span>${esc(entry.card.name)}${entry.card.is_unique ? ' ◆' : ''}</span>
      <span class="qty">×${entry.qty}</span>
    `;
    div.addEventListener('click', () => {
      selectedDeckCard = { side, id };
      selectedCard = entry.card;
      showPreview(entry.card);
      renderDeckLists();
      renderCardList();
    });
    div.addEventListener('dblclick', () => {
      selectedDeckCard = { side, id };
      removeSelectedFromDeck();
    });
    el.appendChild(div);
  });
}

// ── Util ───────────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Go ─────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
